<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>{% if kiosk_branch_name %}{{ kiosk_branch_name }}{% else %}Davomat{% endif %} — Zenko</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:       #080A0D;
  --s1:       #0E1117;
  --s2:       #141920;
  --s3:       #1A2030;
  --b1:       rgba(255,255,255,.05);
  --b2:       rgba(255,255,255,.09);
  --b3:       rgba(255,255,255,.15);
  --g:        #00E676;
  --g2:       rgba(0,230,118,.12);
  --g3:       rgba(0,230,118,.25);
  --amber:    #FFB300;
  --ab:       rgba(255,179,0,.12);
  --red:      #FF4757;
  --rb:       rgba(255,71,87,.12);
  --blue:     #448AFF;
  --bb:       rgba(68,138,255,.12);
  --t1:       #EDF2FA;
  --t2:       #6B7A95;
  --t3:       #2E3A50;
  --font:     'Syne', sans-serif;
  --mono:     'JetBrains Mono', monospace;
}

html,body{
  height:100%;
  overflow:hidden;
  background:var(--bg);
  color:var(--t1);
  font-family:var(--font);
  -webkit-font-smoothing:antialiased;
}

/* ── LAYOUT ─────────────────────────────────── */
.app{
  height:100vh;
  display:grid;
  grid-template-rows: 1fr auto;
  position:relative;
}

/* ════════════════════════════════════════
   KAMERA — yuqori qismi (katta)
════════════════════════════════════════ */
.cam-section{
  position:relative;
  overflow:hidden;
  background:#000;
}

.cam-video{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* Kamera yo'q holati */
.cam-empty{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:14px;
  background:var(--s1);
}
.cam-empty-icon{
  width:56px;height:56px;
  border-radius:50%;
  background:var(--s2);
  border:1px solid var(--b2);
  display:flex;align-items:center;justify-content:center;
}
.cam-empty-icon svg{width:24px;height:24px;color:var(--t3);}
.cam-empty-text{font-size:12px;color:var(--t3);font-family:var(--mono);letter-spacing:.5px;}

/* Gradient overlay — video ustida pastga qoraya boradi */
.cam-gradient{
  position:absolute;
  inset:0;
  background:
    linear-gradient(to bottom,
      rgba(8,10,13,.25) 0%,
      transparent 40%,
      transparent 75%,
      rgba(8,10,13,.38) 92%,
      rgba(8,10,13,.60) 100%
    );
  pointer-events:none;
  z-index:2;
}

/* Flash */
.cam-flash{
  position:absolute;inset:0;z-index:10;
  background:#fff;opacity:0;pointer-events:none;
  transition:opacity .05s;
}
.cam-flash.on{opacity:.85;}

/* ── TOP BAR (kamera ustida) ─────────────────── */
.topbar{
  position:absolute;top:0;left:0;right:0;
  z-index:5;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 18px;
}

.brand{
  display:flex;align-items:center;gap:10px;
}
.brand-logo{
  width:54px;
  height:54px;
  background:var(--g);
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}
.brand-logo svg{width:18px;height:18px;color:#000;}
/* Make the SVG inside the logo bigger */
.brand-logo svg{
  width:32px;
  height:32px;
  color:#000;
}
.brand-name{
  font-size:15px;font-weight:700;
  color:#fff;letter-spacing:.3px;
  text-shadow:0 1px 8px rgba(0,0,0,.6);
}
.brand-branch{
  font-size:10px;color:rgba(255,255,255,.45);
  font-family:var(--mono);margin-top:1px;
}

.topbar-right{display:flex;align-items:center;gap:10px;}

.live-pill{
  display:flex;align-items:center;gap:5px;
  padding:4px 9px;
  background:rgba(0,0,0,.5);
  border:1px solid rgba(0,230,118,.2);
  border-radius:20px;
  backdrop-filter:blur(8px);
}
.live-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--g);
  box-shadow:0 0 6px var(--g);
  animation:blink 2s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.live-text{
  font-size:9px;font-family:var(--mono);
  color:var(--g);letter-spacing:1.2px;
  text-transform:uppercase;
}

.clock-wrap{text-align:right;}
.clock-time{
  font-family:var(--mono);
  font-size:38px;
  font-weight:700;
  color:#fff;
  letter-spacing:2px;
  line-height:1.1;
  text-shadow:0 1px 10px rgba(0,0,0,.7);
}
.clock-date{
  font-size:9px;color:rgba(255,255,255,.35);
  letter-spacing:.5px;margin-top:2px;
  font-family:var(--mono);
}

/* ── YUZ RAMKASI ─────────────────────────────── */
.face-frame{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-60%);
  z-index:3;
  width:120px;height:140px;
  pointer-events:none;
}
.face-frame::before,.face-frame::after,
.face-frame .c::before,.face-frame .c::after{
  content:'';
  position:absolute;
  width:20px;height:20px;
  border-color:rgba(0,230,118,.55);
  border-style:solid;
}
.face-frame::before{top:0;left:0;border-width:2px 0 0 2px;border-radius:3px 0 0 0;}
.face-frame::after{bottom:0;right:0;border-width:0 2px 2px 0;border-radius:0 0 3px 0;}
.face-frame .c::before{top:0;right:0;border-width:2px 2px 0 0;border-radius:0 3px 0 0;}
.face-frame .c::after{bottom:0;left:0;border-width:0 0 2px 2px;border-radius:0 0 0 3px;}

/* ── SCAN LINE animatsiya ────────────────────── */
.scan-line{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-60%);
  width:120px;height:2px;
  z-index:3;
  pointer-events:none;
  overflow:hidden;
}
.scan-line-inner{
  width:100%;height:100%;
  background:linear-gradient(90deg,transparent,var(--g),transparent);
  animation:scanMove 2.5s ease-in-out infinite;
}
@keyframes scanMove{
  0%{transform:translateY(-70px);opacity:0;}
  15%{opacity:1;}
  85%{opacity:1;}
  100%{transform:translateY(70px);opacity:0;}
}

/* ── STATUS CHIP (kamera pastida) ─────────────── */
.status-chip{
  position:absolute;
  bottom:18px;left:50%;
  transform:translateX(-50%);
  z-index:5;
  display:flex;align-items:center;gap:10px;
  padding:7px 20px;
  background:rgba(8,10,13,.82);
  border:1.5px solid var(--b2);
  border-radius:22px;
  backdrop-filter:blur(10px);
  white-space:nowrap;
  box-shadow:0 1px 10px 0 rgba(0,0,0,0.13);
}
.s-dot{
  width:6px;height:6px;border-radius:50%;flex-shrink:0;
}
.s-dot.idle {background:var(--g);animation:blink 2s infinite;}
.s-dot.busy {background:var(--amber);}
.s-dot.ok   {background:var(--g);}
.s-dot.error{background:var(--red);}
.s-msg{
  font-size:22px;
  font-family:var(--mono);
  color:rgba(255,255,255,.85);
  letter-spacing:.5px;
  font-weight:600;
  text-shadow:0 1px 8px rgba(0,0,0,.25);
}

/* ════════════════════════════════════════
   PASTKI PANEL
════════════════════════════════════════ */
.bottom-panel{
  background:var(--s1);
  border-top:1px solid var(--b1);
  padding:14px 18px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  flex-shrink:0;
}

.scan-hint{
  display:flex;align-items:center;gap:10px;
  flex:1;
}
.hint-icon{
  width:38px;height:38px;flex-shrink:0;
  background:var(--s2);
  border:1px solid var(--b2);
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
.hint-icon svg{width:18px;height:18px;color:var(--g);}
/* Burchak dekor */
.hint-icon::before,.hint-icon::after{
  content:'';position:absolute;
  width:6px;height:6px;
  border-color:var(--g);border-style:solid;
}
.hint-icon::before{top:-1px;left:-1px;border-width:1.5px 0 0 1.5px;}
.hint-icon::after{bottom:-1px;right:-1px;border-width:0 1.5px 1.5px 0;}

.hint-text{}
.hint-title{font-size:13px;font-weight:600;color:var(--t1);letter-spacing:.2px;}
.hint-sub{font-size:10px;color:var(--t2);margin-top:2px;font-family:var(--mono);}

.footer-right{
  text-align:right;flex-shrink:0;
}
.footer-branch{
  font-size:11px;font-weight:600;color:var(--t1);
  letter-spacing:.3px;
}
.footer-date{
  font-size:9px;color:var(--t3);
  font-family:var(--mono);margin-top:2px;
  letter-spacing:.5px;
}

/* ════════════════════════════════════════
   RESULT OVERLAY
════════════════════════════════════════ */
.overlay{
  display:none;
  position:fixed;inset:0;z-index:999;
  background:rgba(5,7,12,.9);
  backdrop-filter:blur(24px);
  align-items:center;justify-content:center;
  padding:16px;
}
.overlay.show{
  display:flex;
  animation:fadeIn .16s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.r-card{
  width:100%;max-width:380px;
  background:var(--s1);
  border:1px solid var(--b2);
  border-radius:22px;
  overflow:hidden;
  animation:cardPop .28s cubic-bezier(.16,1,.3,1);
}
@keyframes cardPop{
  from{opacity:0;transform:scale(.88) translateY(16px);}
  to{opacity:1;transform:scale(1) translateY(0);}
}

/* Photo */
.r-photo{
  display:none;
  position:relative;
  width:100%;height:160px;
  background:#000;overflow:hidden;
}
.r-photo img{
  width:100%;height:100%;
  object-fit:cover;display:block;
  filter:brightness(.72);
}
.r-photo::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 30%,var(--s1) 100%);
}
.r-photo-tag{
  position:absolute;top:10px;right:10px;z-index:2;
  background:rgba(0,0,0,.5);
  border:1px solid rgba(255,255,255,.08);
  border-radius:6px;
  font-size:9px;font-family:var(--mono);
  color:rgba(255,255,255,.35);
  padding:2px 7px;
}

/* Body */
.r-body{padding:20px 20px 0;}

.r-top{
  display:flex;align-items:center;gap:14px;
  margin-bottom:14px;
}
.r-avatar{
  width:48px;height:48px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.r-avatar.in {background:var(--g2);}
.r-avatar.out{background:var(--ab);}
.r-avatar.err{background:var(--rb);}
.r-avatar svg{width:22px;height:22px;}
.r-avatar.in  svg{color:var(--g);}
.r-avatar.out svg{color:var(--amber);}
.r-avatar.err svg{color:var(--red);}

.r-title-block{}
.r-tag{
  display:inline-flex;align-items:center;
  padding:2px 10px;
  border-radius:20px;
  font-size:9px;font-weight:500;
  letter-spacing:1.8px;text-transform:uppercase;
  font-family:var(--mono);
  margin-bottom:4px;
}
.r-tag.in {background:var(--g2);color:var(--g);border:1px solid rgba(0,230,118,.18);}
.r-tag.out{background:var(--ab);color:var(--amber);border:1px solid rgba(255,179,0,.18);}
.r-tag.err{background:var(--rb);color:var(--red);border:1px solid rgba(255,71,87,.18);}

.r-name{font-size:19px;font-weight:700;color:var(--t1);letter-spacing:-.2px;line-height:1.15;}
.r-sub {font-size:11px;color:var(--t2);margin-top:2px;font-family:var(--mono);}

/* Divider */
.r-divider{
  height:1px;background:var(--b1);margin:14px 0;
}

/* Alert */
.r-alert{
  display:none;
  padding:8px 12px;border-radius:9px;
  font-size:11px;line-height:1.55;
  margin-bottom:10px;
}
.r-alert.late  {display:block;background:var(--ab); border:1px solid rgba(255,179,0,.15); color:#D4963A;}
.r-alert.early {display:block;background:var(--bb); border:1px solid rgba(68,138,255,.15); color:#7BA9F5;}
.r-alert.info  {display:block;background:var(--g2); border:1px solid rgba(0,230,118,.15);  color:#4DB87A;}

/* Stats */
.r-stats{
  display:grid;grid-template-columns:1fr 1fr;
  gap:7px;margin-bottom:16px;
}
.r-stat{
  background:var(--s2);
  border:1px solid var(--b1);
  border-radius:10px;
  padding:10px 12px;
}
.r-stat .lb{
  font-size:8px;text-transform:uppercase;
  letter-spacing:1.2px;color:var(--t3);
  margin-bottom:4px;font-family:var(--mono);
}
.r-stat .vl{
  font-family:var(--mono);font-size:16px;
  font-weight:500;color:var(--t1);
}
.r-stat .vl.sm{font-size:12px;}
.r-stat .note{font-size:9px;color:var(--t3);margin-top:2px;}

/* Bottom */
.r-bottom{padding:0 20px 18px;}

.r-progress{
  height:2px;
  background:var(--b1);
  border-radius:2px;overflow:hidden;
  margin-bottom:10px;
}
.r-progress-fill{
  height:100%;border-radius:2px;
  background:var(--g);width:100%;
}

.r-btn{
  width:100%;padding:11px;
  background:var(--s2);
  border:1px solid var(--b2);
  border-radius:11px;
  font-family:var(--font);
  font-size:13px;font-weight:600;
  color:var(--t1);cursor:pointer;
  transition:background .12s,border-color .12s;
  letter-spacing:.3px;
}
.r-btn:hover{background:var(--s3);border-color:var(--b3);}
.r-btn:active{transform:scale(.99);}

/* ── Hidden ──────────────────────────────────── */
#hwInput{
  position:fixed;opacity:0;pointer-events:none;
  width:1px;height:1px;top:0;left:0;
}
#snapCanvas{display:none;}
</style>
</head>
<body>

<div class="app">

  <!-- ════ KAMERA QISMI (katta yuqori) ════ -->
  <div class="cam-section">

    <!-- Video -->
    <video class="cam-video" id="camVideo" autoplay muted playsinline style="display:none"></video>

    <!-- Kamera yo'q -->
    <div class="cam-empty" id="camEmpty">
      <div class="cam-empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="m15.75 10.5 4.72-4.72a.75.75 0 0 1 1.28.53v11.38a.75.75 0 0 1-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 0 0 2.25-2.25v-9A2.25 2.25 0 0 0 13.5 5.25h-9A2.25 2.25 0 0 0 2.25 7.5v9A2.25 2.25 0 0 0 4.5 18.75z"/>
        </svg>
      </div>
      <span class="cam-empty-text">kamera ruxsati yo'q</span>
    </div>

    <!-- Gradient overlay -->
    <div class="cam-gradient"></div>

    <!-- Flash -->
    <div class="cam-flash" id="camFlash"></div>

    <!-- Top bar (brand + clock) -->
    <div class="topbar">
      <div class="brand">
        <div class="brand-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <div>
          <div class="brand-name">Zenko</div>
          <div class="brand-branch">{% if kiosk_branch_name %}{{ kiosk_branch_name }}{% else %}davomat tizimi{% endif %}</div>
        </div>
      </div>

      <div class="topbar-right">
        <div class="live-pill">
          <span class="live-dot"></span>
          <span class="live-text">live</span>
        </div>
        <div class="clock-wrap">
          <div class="clock-time" id="clockTime">--:--</div>
          <div class="clock-date" id="clockDate"></div>
        </div>
      </div>
    </div>

    <!-- Yuz ramkasi + scan line -->
    <div class="face-frame"><div class="c"></div></div>
    <div class="scan-line"><div class="scan-line-inner"></div></div>

    <!-- Status chip -->
    <div class="status-chip">
      <div class="s-dot idle" id="sDot"></div>
      <span class="s-msg" id="sMsg">QR kodni skanerga tuting...</span>
    </div>

  </div>

  <!-- ════ PASTKI PANEL ════ -->
  <div class="bottom-panel">
    <div class="scan-hint">
      <div class="hint-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="5" y="5" width="3" height="3" fill="currentColor" stroke="none"/>
          <rect x="16" y="5" width="3" height="3" fill="currentColor" stroke="none"/>
          <rect x="5" y="16" width="3" height="3" fill="currentColor" stroke="none"/>
          <path d="M14 14h3v3M17 17h3M14 20h3"/>
        </svg>
      </div>
      <div class="hint-text">
        <div class="hint-title">Skaner tayyor</div>
        <div class="hint-sub">ID karta → QR skaner</div>
      </div>
    </div>

    <div class="footer-right">
      <div class="footer-branch">{% if kiosk_branch_name %}{{ kiosk_branch_name }}{% else %}—{% endif %}</div>
      <div class="footer-date" id="ftDate"></div>
    </div>
  </div>

</div>

<!-- ════ RESULT OVERLAY ════ -->
<div class="overlay" id="overlay">
  <div class="r-card">

    <div class="r-photo" id="rPhoto">
      <img id="rPhotoImg" src="" alt="">
      <span class="r-photo-tag">snapshot</span>
    </div>

    <div class="r-body">
      <div class="r-top">
        <div class="r-avatar" id="rAvatar"></div>
        <div class="r-title-block">
          <div id="rTag"></div>
          <div class="r-name" id="rName"></div>
          <div class="r-sub"  id="rSub"></div>
        </div>
      </div>

      <div class="r-alert" id="aMain"></div>
      <div class="r-alert" id="aShift"></div>

      <div class="r-divider"></div>
      <div class="r-stats" id="rStats"></div>
    </div>

    <div class="r-bottom">
      <div class="r-progress"><div class="r-progress-fill" id="rFill"></div></div>
      <button class="r-btn" onclick="closeResult()">Davom etish</button>
    </div>

  </div>
</div>

<input id="hwInput" type="text" autocomplete="off" inputmode="none" tabindex="-1">
<canvas id="snapCanvas"></canvas>

<script>
/* ── CONFIG ──────────────────────────────────── */
const BRANCH_ID   = '{{ kiosk_branch_id|default:"" }}';
const API_URL     = '{% url "attendance:api_scan" %}';
const CLOSE_MS    = 2000;

/* ── CLOCK ───────────────────────────────────── */
(function(){
  const te = document.getElementById('clockTime');
  const de = document.getElementById('clockDate');
  const ft = document.getElementById('ftDate');
  const D  = ['Yak','Du','Se','Ch','Pa','Ju','Sh'];
  const M  = ['Yan','Fev','Mar','Apr','May','Iyn','Iyl','Avg','Sen','Okt','Noy','Dek'];
  function tick(){
    const n = new Date();
    const p = v => String(v).padStart(2,'0');
    te.textContent = `${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
    de.textContent = `${D[n.getDay()]}, ${p(n.getDate())} ${M[n.getMonth()]}`;
    if(ft) ft.textContent = `${p(n.getDate())}.${p(n.getMonth()+1)}.${n.getFullYear()}`;
  }
  tick(); setInterval(tick, 1000);
})();

/* ── CAMERA ──────────────────────────────────── */
let camOk = false;

(async function(){
  const vid   = document.getElementById('camVideo');
  const empty = document.getElementById('camEmpty');
  try {
    const s = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:{ exact: 'environment' }, width:{ideal:1280}, height:{ideal:720} },
      audio:false
    });
    vid.srcObject = s;
    await vid.play();
    camOk = true;
    empty.style.display = 'none';
    vid.style.display   = 'block';
    vid.style.transform = 'scaleX(1)'; // Orqa kamera uchun mirror yo‘q
  } catch(e){
    // Agar orqa kamera topilmasa, old kameraga qaytadi
    try {
      const s = await navigator.mediaDevices.getUserMedia({
        video:{ facingMode:'user', width:{ideal:1280}, height:{ideal:720} },
        audio:false
      });
      vid.srcObject = s;
      await vid.play();
      camOk = true;
      empty.style.display = 'none';
      vid.style.display   = 'block';
      vid.style.transform = 'scaleX(-1)'; // Old kamera uchun mirror
    } catch(e2){
      console.warn('Camera:', e2.message);
    }
  }
})();

function doSnap(){
  if(!camOk) return null;
  const v = document.getElementById('camVideo');
  const c = document.getElementById('snapCanvas');
  if(!v.videoWidth) return null;
  c.width  = Math.min(v.videoWidth,  960);
  c.height = Math.min(v.videoHeight, 540);
  c.getContext('2d').drawImage(v, 0, 0, c.width, c.height);
  const fl = document.getElementById('camFlash');
  fl.classList.add('on');
  setTimeout(()=> fl.classList.remove('on'), 110);
  return c.toDataURL('image/jpeg', 0.78);
}

/* ── STATUS ──────────────────────────────────── */
function setStatus(msg, mode){
  document.getElementById('sMsg').textContent = msg;
  document.getElementById('sDot').className   = 's-dot ' + (mode||'idle');
}

/* ── HARDWARE SCANNER ────────────────────────── */
let scanning = true;
let hwTimer  = null;
const hwInput = document.getElementById('hwInput');

function focusHW(){
  if(!document.getElementById('overlay').classList.contains('show'))
    hwInput.focus();
}
focusHW();
setInterval(focusHW, 600);
document.addEventListener('click', ()=> setTimeout(focusHW, 50));

hwInput.addEventListener('keydown', e=>{
  if(e.key === 'Enter'){
    e.preventDefault();
    const val = hwInput.value.trim();
    hwInput.value = '';
    clearTimeout(hwTimer);
    if(!val || !scanning) return;
    scanning = false;
    handleToken(val);
  } else {
    clearTimeout(hwTimer);
    hwTimer = setTimeout(()=>{ hwInput.value=''; }, 800);
  }
});

/* ── TOKEN → API ─────────────────────────────── */
function handleToken(token){
  setStatus('Tekshirilmoqda...', 'busy');
  const photo = doSnap();
  const body  = new URLSearchParams();
  body.append('token', token);
  if(BRANCH_ID) body.append('branch_id', BRANCH_ID);
  if(photo)     body.append('photo', photo);

  fetch(API_URL,{
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body: body.toString()
  })
  .then(r=> r.json())
  .then(d=>{ d._photo = photo; showResult(d); })
  .catch(err=>{
    console.error(err);
    showResult({ok:false, msg:"Tarmoq xatosi. Qayta urinib ko'ring.", _photo:photo});
  });
}

/* ── SVG ICONS ───────────────────────────────── */
const IC = {
  check:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:22px;height:22px"><path d="M20 6L9 17l-5-5"/></svg>`,
  out:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width:22px;height:22px"><path d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6A2.25 2.25 0 0 0 5.25 5.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9"/></svg>`,
  x:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:22px;height:22px"><path d="M6 18 18 6M6 6l12 12"/></svg>`
};

/* ── SHOW RESULT ─────────────────────────────── */
let closeTimer = null;

function showResult(data){
  const ov   = document.getElementById('overlay');
  const av   = document.getElementById('rAvatar');
  const tag  = document.getElementById('rTag');
  const nm   = document.getElementById('rName');
  const sub  = document.getElementById('rSub');
  const am   = document.getElementById('aMain');
  const as_  = document.getElementById('aShift');
  const st   = document.getElementById('rStats');
  const ph   = document.getElementById('rPhoto');
  const pi   = document.getElementById('rPhotoImg');

  /* reset */
  am.className  = 'r-alert';
  as_.className = 'r-alert';
  am.textContent = as_.textContent = '';
  st.innerHTML = '';
  ph.style.display = 'none';

  /* photo */
  if(data._photo){ pi.src = data._photo; ph.style.display='block'; }

  if(data.ok){
    const isOut   = data.action === 'check_out';
    const isEarly = data.is_early;
    const isLate  = data.is_late;

    av.className  = `r-avatar ${isOut?'out':'in'}`;
    av.innerHTML  = isOut ? IC.out : IC.check;
    tag.innerHTML = isOut
      ? '<span class="r-tag out">Chiqish</span>'
      : '<span class="r-tag in">Kirish</span>';
    nm.textContent = data.user_name || '';
    sub.textContent= data.msg       || '';

    /* alerts */
    if(!isOut && isEarly && data.diff_minutes){
      am.className   = 'r-alert early';
      am.textContent = `⬆ Smenadan ${Math.abs(data.diff_minutes)} daqiqa oldin keldi — hisob ${data.hisob_time||data.shift_start}dan boshlanadi`;
    } else if(!isOut && isLate && data.diff_minutes){
      am.className   = 'r-alert late';
      am.textContent = `⚠ ${data.diff_minutes} daqiqa kechikdi`;
    }
    if(!isOut && data.shift_name){
      as_.className   = 'r-alert info';
      as_.textContent = `Smena: ${data.shift_name}  ·  ${data.shift_start||''}–${data.shift_end||''}`;
    }

    /* stats */
    const t  = data.time      || '--:--';
    const ht = data.hisob_time;
    let html = `
      <div class="r-stat">
        <div class="lb">Vaqt</div>
        <div class="vl">${t}</div>
        ${ht && ht!==t ? `<div class="note">hisob: ${ht}</div>` : ''}
      </div>`;

    if(isOut && data.worked){
      html += `
        <div class="r-stat">
          <div class="lb">Ishladi</div>
          <div class="vl sm">${data.worked}</div>
          ${data.early_leave?'<div class="note" style="color:var(--amber)">erta chiqdi</div>':''}
        </div>`;
    } else if(data.status){
      const sm = {present:'Vaqtida',late:'Kechikdi',absent:'Kelmadi',early:'Erta keldi'};
      html += `
        <div class="r-stat">
          <div class="lb">Holat</div>
          <div class="vl sm">${sm[data.status]||data.status}</div>
        </div>`;
    }
    st.innerHTML = html;

    setStatus(
      isOut ? `${data.user_name} chiqdi` : `${data.user_name} kirdi`,
      'ok'
    );
  } else {
    av.className   = 'r-avatar err';
    av.innerHTML   = IC.x;
    tag.innerHTML  = '<span class="r-tag err">Xatolik</span>';
    nm.textContent = 'Muvaffaqiyatsiz';
    sub.textContent= data.msg || "Noma'lum xato";
    setStatus(data.msg || 'Xatolik', 'error');
  }

  /* progress */
  const fill = document.getElementById('rFill');
  fill.style.transition = 'none';
  fill.style.width      = '100%';
  requestAnimationFrame(()=> requestAnimationFrame(()=>{
    fill.style.transition = `width ${CLOSE_MS}ms linear`;
    fill.style.width      = '0%';
  }));

  ov.classList.add('show');
  clearTimeout(closeTimer);
  closeTimer = setTimeout(()=>{
    if(ov.classList.contains('show')) closeResult();
  }, CLOSE_MS);
}

/* ── CLOSE ───────────────────────────────────── */
function closeResult(){
  clearTimeout(closeTimer);
  document.getElementById('overlay').classList.remove('show');
  setStatus("QR kodni skanerga tutsin...", 'idle');
  scanning = true;
  setTimeout(focusHW, 80);
}
</script>
</body>
</html>
