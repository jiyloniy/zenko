<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>{% if kiosk_branch_name %}{{ kiosk_branch_name }}{% else %}Davomat{% endif %} — Zenko</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  /* base */
  --bg:       #05070B;
  --bg2:      #0A0E16;
  --s1:       #0D1219;
  --s2:       #141B26;
  --s3:       #1C2532;
  --s4:       #253040;

  /* borders */
  --b1:       rgba(255,255,255,.04);
  --b2:       rgba(255,255,255,.08);
  --b3:       rgba(255,255,255,.14);

  /* accent — neon emerald */
  --g:        #00FFA3;
  --g-dim:    #00C98A;
  --g-glow:   rgba(0,255,163,.45);
  --g2:       rgba(0,255,163,.10);
  --g3:       rgba(0,255,163,.22);

  /* accent 2 — cyan */
  --cy:       #00E5FF;
  --cy-glow:  rgba(0,229,255,.35);
  --cy2:      rgba(0,229,255,.10);

  /* warn / error */
  --amber:    #FFB74D;
  --ab:       rgba(255,183,77,.12);
  --red:      #FF5370;
  --rb:       rgba(255,83,112,.12);
  --blue:     #5C9CFF;
  --bb:       rgba(92,156,255,.12);

  /* text */
  --t1:       #F4F7FC;
  --t2:       #8896AF;
  --t3:       #404C62;

  --font:     'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono:     'JetBrains Mono', monospace;
}

html,body{
  height:100%;
  overflow:hidden;
  background:var(--bg);
  color:var(--t1);
  font-family:var(--font);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  user-select:none;
}

/* ════════════════════════════════════════
   AMBIENT BACKGROUND — aurora mesh
════════════════════════════════════════ */
body::before{
  content:'';
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(0,255,163,.08), transparent 60%),
    radial-gradient(ellipse 70% 50% at 80% 20%, rgba(0,229,255,.06), transparent 60%),
    radial-gradient(ellipse 60% 50% at 50% 100%, rgba(92,156,255,.05), transparent 60%);
  pointer-events:none;
}

.app{
  position:relative;
  height:100vh;
  display:grid;
  grid-template-rows: 1fr auto;
  z-index:1;
}

/* ════════════════════════════════════════
   KAMERA
════════════════════════════════════════ */
.cam-section{
  position:relative;
  overflow:hidden;
  background:#000;
}

.cam-video{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
}

/* Empty state — stylized */
.cam-empty{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:18px;
  background:
    radial-gradient(ellipse at center, var(--s1), var(--bg) 70%);
}
.cam-empty-icon{
  width:72px;height:72px;
  border-radius:20px;
  background:linear-gradient(135deg, var(--s2), var(--s1));
  border:1px solid var(--b2);
  display:flex;align-items:center;justify-content:center;
  position:relative;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
}
.cam-empty-icon::before{
  content:'';position:absolute;inset:-1px;border-radius:20px;
  background:linear-gradient(135deg, transparent, var(--g3), transparent);
  z-index:-1;opacity:.4;
}
.cam-empty-icon svg{width:28px;height:28px;color:var(--t2);}
.cam-empty-text{
  font-size:11px;color:var(--t2);
  font-family:var(--mono);
  letter-spacing:2px;text-transform:uppercase;
}

/* Multi-layer gradient overlays */
.cam-overlay{
  position:absolute;inset:0;z-index:2;
  pointer-events:none;
  background:
    linear-gradient(180deg,
      rgba(5,7,11,.55) 0%,
      rgba(5,7,11,.15) 18%,
      transparent 35%,
      transparent 65%,
      rgba(5,7,11,.45) 88%,
      rgba(5,7,11,.75) 100%
    );
}

/* Subtle grid overlay */
.cam-grid{
  position:absolute;inset:0;z-index:2;
  pointer-events:none;
  background-image:
    linear-gradient(rgba(0,255,163,.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,163,.035) 1px, transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(ellipse 70% 60% at center, rgba(0,0,0,.7), transparent 85%);
  -webkit-mask-image:radial-gradient(ellipse 70% 60% at center, rgba(0,0,0,.7), transparent 85%);
}

/* Vignette */
.cam-vignette{
  position:absolute;inset:0;z-index:2;
  pointer-events:none;
  box-shadow:inset 0 0 180px rgba(0,0,0,.6);
}

/* Flash */
.cam-flash{
  position:absolute;inset:0;z-index:10;
  background:#fff;opacity:0;pointer-events:none;
  transition:opacity .08s;
}
.cam-flash.on{opacity:.9;}

/* ────────── TOPBAR ────────── */
.topbar{
  position:absolute;top:0;left:0;right:0;
  z-index:5;
  display:flex;align-items:flex-start;
  justify-content:space-between;
  padding:18px 22px;
}

.brand{display:flex;align-items:center;gap:12px;}
.brand-logo{
  position:relative;
  width:52px;height:52px;
  border-radius:15px;
  background:linear-gradient(135deg, var(--g), var(--cy));
  display:flex;align-items:center;justify-content:center;
  box-shadow:
    0 0 0 1px rgba(255,255,255,.08),
    0 8px 24px rgba(0,255,163,.25),
    inset 0 1px 0 rgba(255,255,255,.3);
}
.brand-logo::before{
  content:'';position:absolute;inset:2px;
  border-radius:13px;
  background:linear-gradient(135deg, rgba(255,255,255,.15), transparent 50%);
  pointer-events:none;
}
.brand-logo-letter{
  font-family:var(--font);
  font-size:24px;font-weight:800;
  color:#031A12;
  letter-spacing:-1px;
  position:relative;
  z-index:1;
  text-shadow:0 1px 0 rgba(255,255,255,.25);
}
.brand-info{display:flex;flex-direction:column;gap:2px;}
.brand-name{
  font-size:17px;font-weight:700;
  color:#fff;letter-spacing:-.3px;
  text-shadow:0 2px 12px rgba(0,0,0,.8);
  line-height:1;
}
.brand-branch{
  font-size:10px;
  color:rgba(255,255,255,.55);
  font-family:var(--mono);
  letter-spacing:1px;
  text-transform:uppercase;
  text-shadow:0 1px 6px rgba(0,0,0,.6);
}

.topbar-right{
  display:flex;align-items:center;gap:14px;
}

/* LIVE pill */
.live-pill{
  display:flex;align-items:center;gap:7px;
  padding:6px 11px 6px 10px;
  background:rgba(0,0,0,.45);
  border:1px solid rgba(0,255,163,.25);
  border-radius:20px;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  box-shadow:0 4px 16px rgba(0,0,0,.3);
}
.live-dot{
  position:relative;
  width:6px;height:6px;border-radius:50%;
  background:var(--g);
  box-shadow:0 0 10px var(--g);
}
.live-dot::after{
  content:'';position:absolute;inset:-3px;
  border-radius:50%;
  background:var(--g);opacity:.4;
  animation:livePulse 1.6s ease-out infinite;
}
@keyframes livePulse{
  0%{transform:scale(.5);opacity:.6}
  100%{transform:scale(2.2);opacity:0}
}
.live-text{
  font-size:9px;font-family:var(--mono);font-weight:600;
  color:var(--g);letter-spacing:1.5px;text-transform:uppercase;
}

/* Clock */
.clock-wrap{
  text-align:right;
  padding:8px 14px;
  background:rgba(0,0,0,.35);
  border:1px solid var(--b2);
  border-radius:14px;
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  box-shadow:0 6px 20px rgba(0,0,0,.35);
}
.clock-time{
  font-family:var(--mono);
  font-size:28px;font-weight:600;
  color:#fff;letter-spacing:1.5px;
  line-height:1;
  display:flex;align-items:baseline;justify-content:flex-end;gap:1px;
}
.clock-time .sec{
  font-size:16px;color:var(--g);opacity:.85;font-weight:500;
  margin-left:4px;
}
.clock-time .colon{
  color:var(--g);
  animation:colonBlink 1s infinite;
}
@keyframes colonBlink{0%,100%{opacity:1}50%{opacity:.35}}
.clock-date{
  font-size:9px;color:rgba(255,255,255,.5);
  letter-spacing:1.5px;
  margin-top:3px;
  font-family:var(--mono);
  text-transform:uppercase;
}

/* ────────── FACE FRAME (holographic) ────────── */
.face-wrap{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-58%);
  z-index:3;
  width:200px;height:240px;
  pointer-events:none;
}

/* Outer glow */
.face-wrap::before{
  content:'';position:absolute;inset:-30px;
  border-radius:50%;
  background:radial-gradient(circle, var(--g-glow), transparent 60%);
  opacity:.15;
  filter:blur(24px);
  animation:glowPulse 3s ease-in-out infinite;
}
@keyframes glowPulse{
  0%,100%{opacity:.15;transform:scale(1)}
  50%{opacity:.3;transform:scale(1.05)}
}

/* Corner brackets */
.face-corner{
  position:absolute;
  width:34px;height:34px;
  border:2.5px solid var(--g);
  filter:drop-shadow(0 0 6px var(--g-glow));
}
.face-corner.tl{top:0;left:0;border-right:none;border-bottom:none;border-radius:6px 0 0 0;}
.face-corner.tr{top:0;right:0;border-left:none;border-bottom:none;border-radius:0 6px 0 0;}
.face-corner.bl{bottom:0;left:0;border-right:none;border-top:none;border-radius:0 0 0 6px;}
.face-corner.br{bottom:0;right:0;border-left:none;border-top:none;border-radius:0 0 6px 0;}

/* Corner inner dot */
.face-corner::after{
  content:'';
  position:absolute;
  width:5px;height:5px;border-radius:50%;
  background:var(--g);
  box-shadow:0 0 8px var(--g);
  animation:cornerPulse 1.8s ease-in-out infinite;
}
.face-corner.tl::after{top:-3px;left:-3px;animation-delay:0s;}
.face-corner.tr::after{top:-3px;right:-3px;animation-delay:.2s;}
.face-corner.bl::after{bottom:-3px;left:-3px;animation-delay:.4s;}
.face-corner.br::after{bottom:-3px;right:-3px;animation-delay:.6s;}
@keyframes cornerPulse{
  0%,100%{transform:scale(1);opacity:1}
  50%{transform:scale(1.4);opacity:.5}
}

/* Scan line */
.scan-line{
  position:absolute;
  top:12px;left:12px;right:12px;bottom:12px;
  overflow:hidden;
  border-radius:4px;
  pointer-events:none;
}
.scan-line::before{
  content:'';
  position:absolute;
  left:-10%;right:-10%;height:2px;
  top:0;
  background:linear-gradient(90deg,
    transparent 0%,
    var(--g) 25%,
    #fff 50%,
    var(--g) 75%,
    transparent 100%);
  box-shadow:0 0 14px var(--g), 0 0 28px var(--g-glow);
  animation:scanVert 2.8s cubic-bezier(.6,0,.4,1) infinite;
}
@keyframes scanVert{
  0%{top:0;opacity:0}
  10%{opacity:1}
  90%{opacity:1}
  100%{top:100%;opacity:0}
}

/* Scan trail */
.scan-trail{
  position:absolute;
  top:12px;left:12px;right:12px;bottom:12px;
  overflow:hidden;
  border-radius:4px;
  pointer-events:none;
  opacity:.5;
}
.scan-trail::before{
  content:'';
  position:absolute;
  left:0;right:0;height:80px;
  top:-80px;
  background:linear-gradient(180deg,
    transparent,
    rgba(0,255,163,.08),
    rgba(0,255,163,.15));
  animation:scanTrail 2.8s cubic-bezier(.6,0,.4,1) infinite;
}
@keyframes scanTrail{
  0%{top:-80px}
  100%{top:100%}
}

/* ────────── STATUS CHIP ────────── */
.status-chip{
  position:absolute;
  bottom:28px;left:50%;
  transform:translateX(-50%);
  z-index:5;
  display:flex;align-items:center;gap:14px;
  padding:12px 24px 12px 18px;
  background:rgba(10,14,22,.6);
  border:1px solid rgba(255,255,255,.08);
  border-radius:100px;
  backdrop-filter:blur(20px) saturate(140%);
  -webkit-backdrop-filter:blur(20px) saturate(140%);
  box-shadow:
    0 12px 40px rgba(0,0,0,.4),
    0 0 0 1px rgba(0,255,163,.08),
    inset 0 1px 0 rgba(255,255,255,.06);
  white-space:nowrap;
  max-width:90%;
  transition:all .3s cubic-bezier(.16,1,.3,1);
}

/* Waveform */
.s-wave{
  display:flex;align-items:center;gap:2px;height:20px;
}
.s-wave span{
  width:2px;height:5px;border-radius:1px;
  background:var(--g);
  box-shadow:0 0 4px var(--g-glow);
  animation:wave 1.2s ease-in-out infinite;
}
.s-wave span:nth-child(1){animation-delay:.0s}
.s-wave span:nth-child(2){animation-delay:.1s}
.s-wave span:nth-child(3){animation-delay:.2s}
.s-wave span:nth-child(4){animation-delay:.3s}
.s-wave span:nth-child(5){animation-delay:.4s}
@keyframes wave{
  0%,100%{height:4px;opacity:.4}
  50%{height:18px;opacity:1}
}
.status-chip.busy .s-wave span{background:var(--amber);box-shadow:0 0 4px rgba(255,183,77,.4)}
.status-chip.ok   .s-wave span{background:var(--g);box-shadow:0 0 4px var(--g-glow)}
.status-chip.error .s-wave span{background:var(--red);box-shadow:0 0 4px rgba(255,83,112,.4);animation-play-state:paused;height:16px}

.s-msg{
  font-size:17px;
  font-weight:600;
  color:#fff;
  letter-spacing:.2px;
  font-family:var(--font);
  text-shadow:0 1px 6px rgba(0,0,0,.5);
}

/* ════════════════════════════════════════
   BOTTOM PANEL
════════════════════════════════════════ */
.bottom-panel{
  position:relative;
  background:
    linear-gradient(180deg, var(--bg2), var(--bg));
  border-top:1px solid var(--b1);
  padding:18px 24px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  flex-shrink:0;
}
.bottom-panel::before{
  content:'';position:absolute;
  top:-1px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,
    transparent,
    var(--g3) 30%,
    var(--g3) 70%,
    transparent);
  opacity:.6;
}

.scan-hint{
  display:flex;align-items:center;gap:14px;flex:1;
}
.hint-icon{
  position:relative;
  width:46px;height:46px;flex-shrink:0;
  background:linear-gradient(135deg, var(--s2), var(--s1));
  border:1px solid var(--b2);
  border-radius:13px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.04),
    0 4px 12px rgba(0,0,0,.3);
}
.hint-icon::before{
  content:'';position:absolute;inset:-1px;
  border-radius:13px;
  background:linear-gradient(135deg, var(--g3), transparent 60%);
  z-index:-1;opacity:.5;
}
.hint-icon svg{width:22px;height:22px;color:var(--g);filter:drop-shadow(0 0 6px var(--g-glow));}

.hint-text{display:flex;flex-direction:column;gap:3px;}
.hint-title{
  font-size:14px;font-weight:600;
  color:var(--t1);
  letter-spacing:-.1px;
  display:flex;align-items:center;gap:8px;
}
.hint-title .ready-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--g);
  box-shadow:0 0 6px var(--g-glow);
  animation:readyPulse 2s infinite;
}
@keyframes readyPulse{
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:.5;transform:scale(.85)}
}
.hint-sub{
  font-size:10px;color:var(--t2);
  font-family:var(--mono);
  letter-spacing:.5px;
}

.footer-right{
  display:flex;align-items:center;gap:14px;
  flex-shrink:0;
}
.footer-divider{
  width:1px;height:28px;
  background:var(--b2);
}
.footer-info{text-align:right;}
.footer-branch{
  font-size:12px;font-weight:600;color:var(--t1);
  letter-spacing:.2px;
}
.footer-date{
  font-size:10px;color:var(--t3);
  font-family:var(--mono);margin-top:3px;
  letter-spacing:1px;
}

/* ════════════════════════════════════════
   RESULT OVERLAY
════════════════════════════════════════ */
.overlay{
  display:none;
  position:fixed;inset:0;z-index:999;
  background:rgba(3,5,9,.75);
  backdrop-filter:blur(28px) saturate(140%);
  -webkit-backdrop-filter:blur(28px) saturate(140%);
  align-items:center;justify-content:center;
  padding:16px;
}
.overlay.show{
  display:flex;
  animation:overlayIn .24s cubic-bezier(.16,1,.3,1);
}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}

.r-card{
  position:relative;
  width:100%;max-width:420px;
  background:linear-gradient(180deg, var(--s2), var(--s1));
  border:1px solid var(--b2);
  border-radius:28px;
  overflow:hidden;
  box-shadow:
    0 32px 80px rgba(0,0,0,.6),
    0 0 0 1px rgba(255,255,255,.03),
    inset 0 1px 0 rgba(255,255,255,.05);
  animation:cardPop .4s cubic-bezier(.16,1,.3,1);
}
@keyframes cardPop{
  from{opacity:0;transform:scale(.9) translateY(24px);}
  to{opacity:1;transform:scale(1) translateY(0);}
}

/* Top accent strip */
.r-accent{
  position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg, var(--g), var(--cy), var(--g));
  background-size:200% 100%;
  animation:accentSlide 3s linear infinite;
  z-index:3;
}
@keyframes accentSlide{
  0%{background-position:0% 50%}
  100%{background-position:200% 50%}
}
.r-card.err .r-accent{
  background:linear-gradient(90deg, var(--red), #FF8F9B, var(--red));
  background-size:200% 100%;
}
.r-card.out .r-accent{
  background:linear-gradient(90deg, var(--amber), #FFD699, var(--amber));
  background-size:200% 100%;
}

/* Photo */
.r-photo{
  display:none;
  position:relative;
  width:100%;height:170px;
  background:#000;overflow:hidden;
}
.r-photo img{
  width:100%;height:100%;
  object-fit:cover;display:block;
  filter:brightness(.8) saturate(1.1);
}
.r-photo::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,
    transparent 0%,
    rgba(20,27,38,.3) 60%,
    var(--s2) 100%);
}
.r-photo-tag{
  position:absolute;top:12px;right:12px;z-index:2;
  display:flex;align-items:center;gap:6px;
  background:rgba(0,0,0,.55);
  border:1px solid rgba(255,255,255,.1);
  border-radius:8px;
  backdrop-filter:blur(8px);
  font-size:9px;font-family:var(--mono);font-weight:500;
  color:rgba(255,255,255,.7);
  padding:4px 9px;
  letter-spacing:1px;text-transform:uppercase;
}
.r-photo-tag::before{
  content:'';width:5px;height:5px;border-radius:50%;
  background:var(--g);box-shadow:0 0 4px var(--g);
}

/* Body */
.r-body{padding:22px 24px 0;position:relative;z-index:2;}

.r-top{
  display:flex;align-items:center;gap:14px;
  margin-bottom:16px;
}
.r-avatar{
  position:relative;
  width:56px;height:56px;border-radius:18px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.r-avatar.in {
  background:linear-gradient(135deg, var(--g), var(--g-dim));
  box-shadow:0 8px 24px rgba(0,255,163,.3), inset 0 1px 0 rgba(255,255,255,.3);
}
.r-avatar.out{
  background:linear-gradient(135deg, var(--amber), #E69A2F);
  box-shadow:0 8px 24px rgba(255,183,77,.3), inset 0 1px 0 rgba(255,255,255,.3);
}
.r-avatar.err{
  background:linear-gradient(135deg, var(--red), #E63D54);
  box-shadow:0 8px 24px rgba(255,83,112,.3), inset 0 1px 0 rgba(255,255,255,.3);
}
.r-avatar svg{
  width:26px;height:26px;
  color:#0A1510;
  filter:drop-shadow(0 1px 0 rgba(255,255,255,.2));
}
.r-avatar.err svg{color:#fff;}
.r-avatar.out svg{color:#2A1A00;}

.r-title-block{flex:1;min-width:0;}
.r-tag{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;
  border-radius:6px;
  font-size:9px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  font-family:var(--mono);
  margin-bottom:6px;
}
.r-tag::before{
  content:'';width:4px;height:4px;border-radius:50%;
}
.r-tag.in {background:var(--g2);color:var(--g);border:1px solid rgba(0,255,163,.2);}
.r-tag.in::before{background:var(--g);box-shadow:0 0 4px var(--g);}
.r-tag.out{background:var(--ab);color:var(--amber);border:1px solid rgba(255,183,77,.2);}
.r-tag.out::before{background:var(--amber);box-shadow:0 0 4px var(--amber);}
.r-tag.err{background:var(--rb);color:var(--red);border:1px solid rgba(255,83,112,.2);}
.r-tag.err::before{background:var(--red);box-shadow:0 0 4px var(--red);}

.r-name{
  font-size:20px;font-weight:700;
  color:var(--t1);
  letter-spacing:-.4px;line-height:1.2;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.r-sub{
  font-size:11px;color:var(--t2);
  margin-top:3px;font-family:var(--mono);
  letter-spacing:.3px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

/* Divider */
.r-divider{
  height:1px;
  background:linear-gradient(90deg, transparent, var(--b2), transparent);
  margin:16px 0;
}

/* Alert */
.r-alert{
  display:none;
  align-items:flex-start;gap:8px;
  padding:10px 12px;border-radius:11px;
  font-size:12px;line-height:1.5;font-weight:500;
  margin-bottom:10px;
}
.r-alert::before{
  content:'';
  width:3px;border-radius:2px;align-self:stretch;flex-shrink:0;
}
.r-alert.late  {display:flex;background:var(--ab); border:1px solid rgba(255,183,77,.2); color:#FFC478;}
.r-alert.late::before {background:var(--amber);}
.r-alert.early {display:flex;background:var(--bb); border:1px solid rgba(92,156,255,.2); color:#8FB8FF;}
.r-alert.early::before{background:var(--blue);}
.r-alert.info  {display:flex;background:var(--g2); border:1px solid rgba(0,255,163,.18); color:#5BE5B3;}
.r-alert.info::before {background:var(--g);}

/* Stats */
.r-stats{
  display:grid;grid-template-columns:1fr 1fr;
  gap:8px;margin-bottom:18px;
}
.r-stat{
  position:relative;
  background:linear-gradient(180deg, rgba(255,255,255,.025), transparent);
  border:1px solid var(--b1);
  border-radius:13px;
  padding:12px 14px;
  overflow:hidden;
}
.r-stat::before{
  content:'';position:absolute;
  top:0;left:0;width:3px;height:20px;
  background:var(--g);
  border-radius:0 2px 2px 0;
  opacity:.6;
}
.r-stat.amber::before{background:var(--amber);}
.r-stat .lb{
  font-size:8px;text-transform:uppercase;
  letter-spacing:1.5px;color:var(--t2);
  margin-bottom:5px;font-family:var(--mono);font-weight:600;
}
.r-stat .vl{
  font-family:var(--mono);font-size:18px;
  font-weight:600;color:var(--t1);
  letter-spacing:.5px;line-height:1;
}
.r-stat .vl.sm{font-size:13px;}
.r-stat .note{
  font-size:9px;color:var(--t3);
  margin-top:4px;font-family:var(--mono);
  letter-spacing:.3px;
}

/* Bottom */
.r-bottom{padding:0 24px 22px;position:relative;z-index:2;}

.r-progress{
  height:3px;
  background:var(--b1);
  border-radius:2px;overflow:hidden;
  margin-bottom:14px;
  position:relative;
}
.r-progress-fill{
  height:100%;border-radius:2px;
  background:linear-gradient(90deg, var(--g), var(--cy));
  box-shadow:0 0 8px var(--g-glow);
  width:100%;
}

.r-btn{
  position:relative;
  width:100%;padding:13px;
  background:linear-gradient(180deg, var(--s3), var(--s2));
  border:1px solid var(--b2);
  border-radius:13px;
  font-family:var(--font);
  font-size:13px;font-weight:600;
  color:var(--t1);cursor:pointer;
  transition:all .15s ease;
  letter-spacing:.3px;
  overflow:hidden;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
}
.r-btn:hover{
  background:linear-gradient(180deg, var(--s4), var(--s3));
  border-color:var(--b3);
}
.r-btn:active{transform:scale(.99);}

/* Hidden */
#hwInput{
  position:fixed;opacity:0;pointer-events:none;
  width:1px;height:1px;top:0;left:0;
}
#snapCanvas{display:none;}

/* Small screens */
@media (max-height:600px){
  .face-wrap{width:160px;height:190px;transform:translate(-50%,-55%);}
  .clock-time{font-size:24px;}
  .s-msg{font-size:15px;}
  .status-chip{bottom:18px;padding:10px 20px;}
}
@media (max-width:420px){
  .topbar{padding:14px 16px;}
  .clock-time{font-size:22px;}
  .brand-name{font-size:15px;}
  .bottom-panel{padding:14px 16px;}
}
</style>
</head>
<body>

<div class="app">

  <!-- ════ KAMERA ════ -->
  <div class="cam-section">

    <video class="cam-video" id="camVideo" autoplay muted playsinline style="display:none"></video>

    <!-- Empty state -->
    <div class="cam-empty" id="camEmpty">
      <div class="cam-empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="m15.75 10.5 4.72-4.72a.75.75 0 0 1 1.28.53v11.38a.75.75 0 0 1-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 0 0 2.25-2.25v-9A2.25 2.25 0 0 0 13.5 5.25h-9A2.25 2.25 0 0 0 2.25 7.5v9A2.25 2.25 0 0 0 4.5 18.75z"/>
        </svg>
      </div>
      <span class="cam-empty-text">kamera kutilmoqda</span>
    </div>

    <!-- Overlays -->
    <div class="cam-overlay"></div>
    <div class="cam-grid"></div>
    <div class="cam-vignette"></div>
    <div class="cam-flash" id="camFlash"></div>

    <!-- Topbar -->
    <div class="topbar">
      <div class="brand">
        <div class="brand-logo">
          <span class="brand-logo-letter">Z</span>
        </div>
        <div class="brand-info">
          <div class="brand-name">Zenko</div>
          <div class="brand-branch">{% if kiosk_branch_name %}{{ kiosk_branch_name }}{% else %}davomat tizimi{% endif %}</div>
        </div>
      </div>

      <div class="topbar-right">
        <div class="live-pill">
          <span class="live-dot"></span>
          <span class="live-text">live</span>
        </div>
        <div class="clock-wrap">
          <div class="clock-time" id="clockTime">--<span class="colon">:</span>--<span class="sec" id="clockSec">--</span></div>
          <div class="clock-date" id="clockDate">—</div>
        </div>
      </div>
    </div>

    <!-- Face frame -->
    <div class="face-wrap">
      <div class="scan-trail"></div>
      <div class="scan-line"></div>
      <div class="face-corner tl"></div>
      <div class="face-corner tr"></div>
      <div class="face-corner bl"></div>
      <div class="face-corner br"></div>
    </div>

    <!-- Status chip -->
    <div class="status-chip" id="statusChip">
      <div class="s-wave">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <span class="s-msg" id="sMsg">QR kodni skanerga tuting</span>
    </div>

  </div>

  <!-- ════ BOTTOM PANEL ════ -->
  <div class="bottom-panel">
    <div class="scan-hint">
      <div class="hint-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1.5"/>
          <rect x="14" y="3" width="7" height="7" rx="1.5"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5"/>
          <rect x="5.5" y="5.5" width="2" height="2" fill="currentColor" stroke="none"/>
          <rect x="16.5" y="5.5" width="2" height="2" fill="currentColor" stroke="none"/>
          <rect x="5.5" y="16.5" width="2" height="2" fill="currentColor" stroke="none"/>
          <path d="M14 14h3M14 17h3M14 20h7M17 17v4M20 14v3"/>
        </svg>
      </div>
      <div class="hint-text">
        <div class="hint-title">
          <span class="ready-dot"></span>
          Skaner tayyor
        </div>
        <div class="hint-sub">ID karta · QR kod · biometrika</div>
      </div>
    </div>

    <div class="footer-right">
      <div class="footer-divider"></div>
      <div class="footer-info">
        <div class="footer-branch">{% if kiosk_branch_name %}{{ kiosk_branch_name }}{% else %}—{% endif %}</div>
        <div class="footer-date" id="ftDate">—</div>
      </div>
    </div>
  </div>

</div>

<!-- ════ RESULT OVERLAY ════ -->
<div class="overlay" id="overlay">
  <div class="r-card" id="rCard">
    <div class="r-accent"></div>

    <div class="r-photo" id="rPhoto">
      <img id="rPhotoImg" src="" alt="">
      <span class="r-photo-tag">snapshot</span>
    </div>

    <div class="r-body">
      <div class="r-top">
        <div class="r-avatar" id="rAvatar"></div>
        <div class="r-title-block">
          <div id="rTag"></div>
          <div class="r-name" id="rName"></div>
          <div class="r-sub" id="rSub"></div>
        </div>
      </div>

      <div class="r-alert" id="aMain"></div>
      <div class="r-alert" id="aShift"></div>

      <div class="r-divider"></div>
      <div class="r-stats" id="rStats"></div>
    </div>

    <div class="r-bottom">
      <div class="r-progress"><div class="r-progress-fill" id="rFill"></div></div>
      <button class="r-btn" onclick="closeResult()">Davom etish</button>
    </div>
  </div>
</div>

<input id="hwInput" type="text" autocomplete="off" inputmode="none" tabindex="-1">
<canvas id="snapCanvas"></canvas>

<script>
/* ── CONFIG ──────────────────────────────────── */
const BRANCH_ID   = '{{ kiosk_branch_id|default:"" }}';
const API_URL     = '{% url "attendance:api_scan" %}';
const CLOSE_MS    = 2000;

/* ── CLOCK ───────────────────────────────────── */
(function(){
  const te  = document.getElementById('clockTime');
  const sec = document.getElementById('clockSec');
  const de  = document.getElementById('clockDate');
  const ft  = document.getElementById('ftDate');
  const D   = ['Yak','Du','Se','Ch','Pa','Ju','Sh'];
  const M   = ['Yan','Fev','Mar','Apr','May','Iyn','Iyl','Avg','Sen','Okt','Noy','Dek'];
  function tick(){
    const n = new Date();
    const p = v => String(v).padStart(2,'0');
    te.innerHTML = `${p(n.getHours())}<span class="colon">:</span>${p(n.getMinutes())}<span class="sec">${p(n.getSeconds())}</span>`;
    de.textContent = `${D[n.getDay()]} · ${p(n.getDate())} ${M[n.getMonth()]} ${n.getFullYear()}`;
    if(ft) ft.textContent = `${p(n.getDate())}.${p(n.getMonth()+1)}.${n.getFullYear()}`;
  }
  tick(); setInterval(tick, 1000);
})();

/* ── CAMERA ──────────────────────────────────── */
let camOk = false;

(async function(){
  const vid   = document.getElementById('camVideo');
  const empty = document.getElementById('camEmpty');
  try {
    const s = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:{ exact: 'environment' }, width:{ideal:1280}, height:{ideal:720} },
      audio:false
    });
    vid.srcObject = s;
    await vid.play();
    camOk = true;
    empty.style.display = 'none';
    vid.style.display   = 'block';
    vid.style.transform = 'scaleX(1)';
  } catch(e){
    try {
      const s = await navigator.mediaDevices.getUserMedia({
        video:{ facingMode:'user', width:{ideal:1280}, height:{ideal:720} },
        audio:false
      });
      vid.srcObject = s;
      await vid.play();
      camOk = true;
      empty.style.display = 'none';
      vid.style.display   = 'block';
      vid.style.transform = 'scaleX(-1)';
    } catch(e2){
      console.warn('Camera:', e2.message);
    }
  }
})();

function doSnap(){
  if(!camOk) return null;
  const v = document.getElementById('camVideo');
  const c = document.getElementById('snapCanvas');
  if(!v.videoWidth) return null;
  c.width  = Math.min(v.videoWidth,  960);
  c.height = Math.min(v.videoHeight, 540);
  c.getContext('2d').drawImage(v, 0, 0, c.width, c.height);
  const fl = document.getElementById('camFlash');
  fl.classList.add('on');
  setTimeout(()=> fl.classList.remove('on'), 120);
  return c.toDataURL('image/jpeg', 0.78);
}

/* ── STATUS ──────────────────────────────────── */
function setStatus(msg, mode){
  document.getElementById('sMsg').textContent = msg;
  const chip = document.getElementById('statusChip');
  chip.classList.remove('busy','ok','error','idle');
  chip.classList.add(mode || 'idle');
}

/* ── HARDWARE SCANNER ────────────────────────── */
let scanning = true;
let hwTimer  = null;
const hwInput = document.getElementById('hwInput');

function focusHW(){
  if(!document.getElementById('overlay').classList.contains('show'))
    hwInput.focus();
}
focusHW();
setInterval(focusHW, 600);
document.addEventListener('click', ()=> setTimeout(focusHW, 50));

hwInput.addEventListener('keydown', e=>{
  if(e.key === 'Enter'){
    e.preventDefault();
    const val = hwInput.value.trim();
    hwInput.value = '';
    clearTimeout(hwTimer);
    if(!val || !scanning) return;
    scanning = false;
    handleToken(val);
  } else {
    clearTimeout(hwTimer);
    hwTimer = setTimeout(()=>{ hwInput.value=''; }, 800);
  }
});

/* ── TOKEN → API ─────────────────────────────── */
function handleToken(token){
  setStatus('Tekshirilmoqda...', 'busy');
  const photo = doSnap();
  const body  = new URLSearchParams();
  body.append('token', token);
  if(BRANCH_ID) body.append('branch_id', BRANCH_ID);
  if(photo)     body.append('photo', photo);

  fetch(API_URL,{
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body: body.toString()
  })
  .then(r=> r.json())
  .then(d=>{ d._photo = photo; showResult(d); })
  .catch(err=>{
    console.error(err);
    showResult({ok:false, msg:"Tarmoq xatosi. Qayta urinib ko'ring.", _photo:photo});
  });
}

/* ── SVG ICONS ───────────────────────────────── */
const IC = {
  check:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>`,
  out:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6A2.25 2.25 0 0 0 5.25 5.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9"/></svg>`,
  x:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 18 18 6M6 6l12 12"/></svg>`
};

/* ── SHOW RESULT ─────────────────────────────── */
let closeTimer = null;

function showResult(data){
  const ov   = document.getElementById('overlay');
  const card = document.getElementById('rCard');
  const av   = document.getElementById('rAvatar');
  const tag  = document.getElementById('rTag');
  const nm   = document.getElementById('rName');
  const sub  = document.getElementById('rSub');
  const am   = document.getElementById('aMain');
  const as_  = document.getElementById('aShift');
  const st   = document.getElementById('rStats');
  const ph   = document.getElementById('rPhoto');
  const pi   = document.getElementById('rPhotoImg');

  /* reset */
  am.className  = 'r-alert';
  as_.className = 'r-alert';
  am.textContent = as_.textContent = '';
  st.innerHTML = '';
  ph.style.display = 'none';
  card.className = 'r-card';

  if(data._photo){ pi.src = data._photo; ph.style.display='block'; }

  if(data.ok){
    const isOut   = data.action === 'check_out';
    const isEarly = data.is_early;
    const isLate  = data.is_late;

    if(isOut) card.classList.add('out');

    av.className  = `r-avatar ${isOut?'out':'in'}`;
    av.innerHTML  = isOut ? IC.out : IC.check;
    tag.innerHTML = isOut
      ? '<span class="r-tag out">Chiqish</span>'
      : '<span class="r-tag in">Kirish</span>';
    nm.textContent = data.user_name || '';
    sub.textContent= data.msg       || '';

    if(!isOut && isEarly && data.diff_minutes){
      am.className   = 'r-alert early';
      am.innerHTML   = `<div><strong>Erta kelish</strong> · Smenadan ${Math.abs(data.diff_minutes)} daqiqa oldin · hisob ${data.hisob_time||data.shift_start}dan boshlanadi</div>`;
    } else if(!isOut && isLate && data.diff_minutes){
      am.className   = 'r-alert late';
      am.innerHTML   = `<div><strong>Kechikish</strong> · ${data.diff_minutes} daqiqa kech keldi</div>`;
    }
    if(!isOut && data.shift_name){
      as_.className   = 'r-alert info';
      as_.innerHTML   = `<div><strong>${data.shift_name}</strong> · ${data.shift_start||''}–${data.shift_end||''}</div>`;
    }

    const t  = data.time      || '--:--';
    const ht = data.hisob_time;
    let html = `
      <div class="r-stat">
        <div class="lb">Vaqt</div>
        <div class="vl">${t}</div>
        ${ht && ht!==t ? `<div class="note">hisob: ${ht}</div>` : ''}
      </div>`;

    if(isOut && data.worked){
      html += `
        <div class="r-stat${data.early_leave?' amber':''}">
          <div class="lb">Ishladi</div>
          <div class="vl sm">${data.worked}</div>
          ${data.early_leave?'<div class="note" style="color:var(--amber)">erta chiqdi</div>':''}
        </div>`;
    } else if(data.status){
      const sm = {present:'Vaqtida',late:'Kechikdi',absent:'Kelmadi',early:'Erta keldi'};
      html += `
        <div class="r-stat">
          <div class="lb">Holat</div>
          <div class="vl sm">${sm[data.status]||data.status}</div>
        </div>`;
    }
    st.innerHTML = html;

    setStatus(
      isOut ? `${data.user_name} chiqdi` : `${data.user_name} kirdi`,
      'ok'
    );
  } else {
    card.classList.add('err');
    av.className   = 'r-avatar err';
    av.innerHTML   = IC.x;
    tag.innerHTML  = '<span class="r-tag err">Xatolik</span>';
    nm.textContent = 'Muvaffaqiyatsiz';
    sub.textContent= data.msg || "Noma'lum xato";
    setStatus(data.msg || 'Xatolik', 'error');
  }

  const fill = document.getElementById('rFill');
  fill.style.transition = 'none';
  fill.style.width      = '100%';
  requestAnimationFrame(()=> requestAnimationFrame(()=>{
    fill.style.transition = `width ${CLOSE_MS}ms linear`;
    fill.style.width      = '0%';
  }));

  ov.classList.add('show');
  clearTimeout(closeTimer);
  closeTimer = setTimeout(()=>{
    if(ov.classList.contains('show')) closeResult();
  }, CLOSE_MS);
}

/* ── CLOSE ───────────────────────────────────── */
function closeResult(){
  clearTimeout(closeTimer);
  document.getElementById('overlay').classList.remove('show');
  setStatus("QR kodni skanerga tuting", 'idle');
  scanning = true;
  setTimeout(focusHW, 80);
}
</script>
</body>
</html>
