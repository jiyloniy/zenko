<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>{% if kiosk_branch_name %}{{ kiosk_branch_name }}{% else %}Davomat{% endif %} — Zenko</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  /* base */
  --bg:       #04060A;
  --bg2:      #080C14;
  --s1:       #0C1119;
  --s2:       #131925;
  --s3:       #1B2332;
  --s4:       #242F42;

  /* borders */
  --b1:       rgba(255,255,255,.04);
  --b2:       rgba(255,255,255,.08);
  --b3:       rgba(255,255,255,.14);

  /* primary — emerald neon */
  --g:        #00FFA3;
  --g-dim:    #00C98A;
  --g-deep:   #008F60;
  --g-glow:   rgba(0,255,163,.5);
  --g2:       rgba(0,255,163,.10);
  --g3:       rgba(0,255,163,.22);

  /* secondary — electric cyan */
  --cy:       #00E5FF;
  --cy-glow:  rgba(0,229,255,.4);
  --cy2:      rgba(0,229,255,.10);

  /* tertiary — violet */
  --vi:       #A78BFA;
  --vi-glow:  rgba(167,139,250,.35);

  /* warn / error */
  --amber:    #FFB74D;
  --ab:       rgba(255,183,77,.12);
  --red:      #FF5370;
  --rb:       rgba(255,83,112,.12);
  --blue:     #5C9CFF;
  --bb:       rgba(92,156,255,.12);

  /* text */
  --t1:       #F5F8FD;
  --t2:       #8C9AB4;
  --t3:       #3E4A5F;

  --font:     'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono:     'JetBrains Mono', monospace;
}

html,body{
  height:100%;
  overflow:hidden;
  background:var(--bg);
  color:var(--t1);
  font-family:var(--font);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}

/* ════════════════════════════════════════
   AMBIENT BACKGROUND — animated aurora
════════════════════════════════════════ */
body::before{
  content:'';
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(0,255,163,.10), transparent 60%),
    radial-gradient(ellipse 70% 50% at 80% 20%, rgba(0,229,255,.08), transparent 60%),
    radial-gradient(ellipse 60% 50% at 50% 100%, rgba(167,139,250,.07), transparent 60%);
  pointer-events:none;
  animation:auroraShift 20s ease-in-out infinite alternate;
}
@keyframes auroraShift{
  0%{filter:hue-rotate(0deg)}
  100%{filter:hue-rotate(20deg)}
}

.app{
  position:relative;
  height:100vh;
  display:grid;
  grid-template-rows: 1fr auto;
  z-index:1;
}

/* ════════════════════════════════════════
   KAMERA
════════════════════════════════════════ */
.cam-section{
  position:relative;
  overflow:hidden;
  background:#000;
}

.cam-video{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
}

/* Empty state */
.cam-empty{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:20px;
  background:
    radial-gradient(ellipse at center, var(--s1), var(--bg) 70%);
}
.cam-empty-icon{
  width:80px;height:80px;
  border-radius:22px;
  background:linear-gradient(135deg, var(--s2), var(--s1));
  border:1px solid var(--b2);
  display:flex;align-items:center;justify-content:center;
  position:relative;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
}
.cam-empty-icon::before{
  content:'';position:absolute;inset:-1px;border-radius:22px;
  background:linear-gradient(135deg, transparent, var(--g3), transparent);
  z-index:-1;opacity:.4;
}
.cam-empty-icon svg{width:32px;height:32px;color:var(--t2);}
.cam-empty-text{
  font-size:11px;color:var(--t2);
  font-family:var(--mono);font-weight:500;
  letter-spacing:3px;text-transform:uppercase;
}

/* Overlays */
.cam-overlay{
  position:absolute;inset:0;z-index:2;
  pointer-events:none;
  background:
    linear-gradient(180deg,
      rgba(4,6,10,.6) 0%,
      rgba(4,6,10,.15) 18%,
      transparent 35%,
      transparent 60%,
      rgba(4,6,10,.45) 85%,
      rgba(4,6,10,.8) 100%
    );
}

.cam-grid{
  position:absolute;inset:0;z-index:2;
  pointer-events:none;
  background-image:
    linear-gradient(rgba(0,255,163,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,163,.04) 1px, transparent 1px);
  background-size:56px 56px;
  mask-image:radial-gradient(ellipse 70% 60% at center, rgba(0,0,0,.8), transparent 85%);
  -webkit-mask-image:radial-gradient(ellipse 70% 60% at center, rgba(0,0,0,.8), transparent 85%);
  animation:gridDrift 40s linear infinite;
}
@keyframes gridDrift{
  from{background-position:0 0}
  to{background-position:56px 56px}
}

.cam-vignette{
  position:absolute;inset:0;z-index:2;
  pointer-events:none;
  box-shadow:inset 0 0 220px rgba(0,0,0,.7);
}

/* Floating particles */
.particles{
  position:absolute;inset:0;z-index:2;
  pointer-events:none;
  overflow:hidden;
}
.particle{
  position:absolute;
  width:2px;height:2px;
  border-radius:50%;
  background:var(--g);
  box-shadow:0 0 8px var(--g);
  opacity:0;
  animation:particleFloat 8s linear infinite;
}
@keyframes particleFloat{
  0%{transform:translateY(100vh) translateX(0);opacity:0}
  10%{opacity:.6}
  90%{opacity:.6}
  100%{transform:translateY(-20vh) translateX(30px);opacity:0}
}

/* Flash */
.cam-flash{
  position:absolute;inset:0;z-index:10;
  background:#fff;opacity:0;pointer-events:none;
  transition:opacity .08s;
}
.cam-flash.on{opacity:.9;}

/* Success / Error flash */
.cam-signal{
  position:absolute;inset:0;z-index:10;
  pointer-events:none;opacity:0;
  transition:opacity .4s;
}
.cam-signal.ok{
  background:radial-gradient(ellipse at center, rgba(0,255,163,.3), transparent 70%);
}
.cam-signal.err{
  background:radial-gradient(ellipse at center, rgba(255,83,112,.3), transparent 70%);
}
.cam-signal.on{opacity:1;animation:signalPulse .8s ease-out;}
@keyframes signalPulse{
  0%{opacity:0;transform:scale(.9)}
  30%{opacity:1}
  100%{opacity:0;transform:scale(1.05)}
}

/* ────────── TOPBAR ────────── */
.topbar{
  position:absolute;top:0;left:0;right:0;
  z-index:5;
  display:flex;align-items:flex-start;
  justify-content:space-between;
  padding:20px 24px;
}

.brand{display:flex;align-items:center;gap:14px;}
.brand-logo{
  position:relative;
  width:56px;height:56px;
  border-radius:17px;
  background:linear-gradient(135deg, var(--g) 0%, var(--cy) 100%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:
    0 0 0 1px rgba(255,255,255,.12),
    0 10px 32px rgba(0,255,163,.35),
    0 2px 8px rgba(0,229,255,.2),
    inset 0 1px 0 rgba(255,255,255,.35);
  overflow:hidden;
}
.brand-logo::before{
  content:'';position:absolute;inset:2px;
  border-radius:15px;
  background:linear-gradient(135deg, rgba(255,255,255,.22), transparent 50%);
  pointer-events:none;
}
.brand-logo::after{
  content:'';position:absolute;
  top:-50%;left:-50%;width:200%;height:200%;
  background:linear-gradient(45deg, transparent 40%, rgba(255,255,255,.3) 50%, transparent 60%);
  animation:logoShine 4s ease-in-out infinite;
}
@keyframes logoShine{
  0%,100%{transform:translateX(-100%) translateY(-100%)}
  50%{transform:translateX(100%) translateY(100%)}
}
.brand-logo-letter{
  font-family:var(--font);
  font-size:26px;font-weight:900;
  color:#031A12;
  letter-spacing:-1.5px;
  position:relative;
  z-index:1;
  text-shadow:0 1px 0 rgba(255,255,255,.3);
}
.brand-info{display:flex;flex-direction:column;gap:3px;}
.brand-name{
  font-size:18px;font-weight:800;
  color:#fff;letter-spacing:-.5px;
  text-shadow:0 2px 14px rgba(0,0,0,.9);
  line-height:1;
  background:linear-gradient(90deg, #fff, #E8FFF7);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.brand-branch{
  font-size:10px;
  color:rgba(255,255,255,.55);
  font-family:var(--mono);font-weight:500;
  letter-spacing:1.5px;
  text-transform:uppercase;
  text-shadow:0 1px 6px rgba(0,0,0,.6);
}

.topbar-right{
  display:flex;align-items:center;gap:14px;
}

/* LIVE pill */
.live-pill{
  display:flex;align-items:center;gap:7px;
  padding:7px 12px 7px 11px;
  background:rgba(0,0,0,.5);
  border:1px solid rgba(0,255,163,.3);
  border-radius:20px;
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  box-shadow:0 4px 16px rgba(0,0,0,.4);
}
.live-dot{
  position:relative;
  width:6px;height:6px;border-radius:50%;
  background:var(--g);
  box-shadow:0 0 12px var(--g);
}
.live-dot::after{
  content:'';position:absolute;inset:-3px;
  border-radius:50%;
  background:var(--g);opacity:.4;
  animation:livePulse 1.6s ease-out infinite;
}
@keyframes livePulse{
  0%{transform:scale(.5);opacity:.7}
  100%{transform:scale(2.5);opacity:0}
}
.live-text{
  font-size:9px;font-family:var(--mono);font-weight:700;
  color:var(--g);letter-spacing:1.8px;text-transform:uppercase;
}

/* Clock */
.clock-wrap{
  text-align:right;
  padding:10px 16px;
  background:rgba(0,0,0,.4);
  border:1px solid var(--b2);
  border-radius:16px;
  backdrop-filter:blur(16px) saturate(130%);
  -webkit-backdrop-filter:blur(16px) saturate(130%);
  box-shadow:
    0 8px 24px rgba(0,0,0,.4),
    inset 0 1px 0 rgba(255,255,255,.04);
}
.clock-time{
  font-family:var(--mono);
  font-size:30px;font-weight:700;
  color:#fff;letter-spacing:1px;
  line-height:1;
  display:flex;align-items:baseline;justify-content:flex-end;gap:1px;
  text-shadow:0 0 20px rgba(0,255,163,.2);
}
.clock-time .sec{
  font-size:16px;
  color:var(--g);
  opacity:.9;
  font-weight:600;
  margin-left:5px;
  text-shadow:0 0 10px var(--g-glow);
}
.clock-time .colon{
  color:var(--g);
  animation:colonBlink 1s infinite;
  text-shadow:0 0 10px var(--g-glow);
}
@keyframes colonBlink{0%,100%{opacity:1}50%{opacity:.3}}
.clock-date{
  font-size:9px;color:rgba(255,255,255,.55);
  letter-spacing:2px;
  margin-top:4px;
  font-family:var(--mono);font-weight:500;
  text-transform:uppercase;
}

/* ────────── FACE FRAME — holographic ────────── */
.face-wrap{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-58%);
  z-index:3;
  width:220px;height:260px;
  pointer-events:none;
}

/* Outer halo glow */
.face-wrap::before{
  content:'';position:absolute;inset:-40px;
  border-radius:50%;
  background:radial-gradient(circle, var(--g-glow), transparent 60%);
  opacity:.2;
  filter:blur(30px);
  animation:glowPulse 3s ease-in-out infinite;
}
@keyframes glowPulse{
  0%,100%{opacity:.18;transform:scale(1)}
  50%{opacity:.35;transform:scale(1.08)}
}

/* Rotating outer ring */
.face-ring{
  position:absolute;inset:-14px;
  border-radius:50%;
  border:1px dashed rgba(0,255,163,.25);
  animation:ringRotate 20s linear infinite;
}
.face-ring::before,.face-ring::after{
  content:'';position:absolute;
  width:8px;height:8px;border-radius:50%;
  background:var(--g);
  box-shadow:0 0 10px var(--g);
}
.face-ring::before{top:-4px;left:50%;transform:translateX(-50%);}
.face-ring::after{bottom:-4px;left:50%;transform:translateX(-50%);}
@keyframes ringRotate{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}

/* Corner brackets */
.face-corner{
  position:absolute;
  width:38px;height:38px;
  border:3px solid var(--g);
  filter:drop-shadow(0 0 8px var(--g-glow));
}
.face-corner.tl{top:0;left:0;border-right:none;border-bottom:none;border-radius:8px 0 0 0;}
.face-corner.tr{top:0;right:0;border-left:none;border-bottom:none;border-radius:0 8px 0 0;}
.face-corner.bl{bottom:0;left:0;border-right:none;border-top:none;border-radius:0 0 0 8px;}
.face-corner.br{bottom:0;right:0;border-left:none;border-top:none;border-radius:0 0 8px 0;}

.face-corner::after{
  content:'';
  position:absolute;
  width:6px;height:6px;border-radius:50%;
  background:var(--g);
  box-shadow:0 0 12px var(--g);
  animation:cornerPulse 1.8s ease-in-out infinite;
}
.face-corner.tl::after{top:-4px;left:-4px;animation-delay:0s;}
.face-corner.tr::after{top:-4px;right:-4px;animation-delay:.2s;}
.face-corner.bl::after{bottom:-4px;left:-4px;animation-delay:.4s;}
.face-corner.br::after{bottom:-4px;right:-4px;animation-delay:.6s;}
@keyframes cornerPulse{
  0%,100%{transform:scale(1);opacity:1}
  50%{transform:scale(1.5);opacity:.4}
}

/* Crosshair */
.face-cross{
  position:absolute;
  top:50%;left:50%;
  width:40px;height:40px;
  transform:translate(-50%,-50%);
  pointer-events:none;
  opacity:.4;
}
.face-cross::before,.face-cross::after{
  content:'';position:absolute;
  background:var(--g);
  box-shadow:0 0 6px var(--g-glow);
}
.face-cross::before{
  top:50%;left:0;right:0;height:1px;
  transform:translateY(-50%);
}
.face-cross::after{
  left:50%;top:0;bottom:0;width:1px;
  transform:translateX(-50%);
}

/* Scan line */
.scan-line{
  position:absolute;
  top:14px;left:14px;right:14px;bottom:14px;
  overflow:hidden;
  border-radius:4px;
  pointer-events:none;
}
.scan-line::before{
  content:'';
  position:absolute;
  left:-10%;right:-10%;height:2.5px;
  top:0;
  background:linear-gradient(90deg,
    transparent 0%,
    var(--g) 20%,
    #fff 50%,
    var(--g) 80%,
    transparent 100%);
  box-shadow:0 0 16px var(--g), 0 0 32px var(--g-glow);
  animation:scanVert 2.8s cubic-bezier(.6,0,.4,1) infinite;
}
@keyframes scanVert{
  0%{top:0;opacity:0}
  10%{opacity:1}
  90%{opacity:1}
  100%{top:100%;opacity:0}
}

.scan-trail{
  position:absolute;
  top:14px;left:14px;right:14px;bottom:14px;
  overflow:hidden;
  border-radius:4px;
  pointer-events:none;
  opacity:.6;
}
.scan-trail::before{
  content:'';
  position:absolute;
  left:0;right:0;height:100px;
  top:-100px;
  background:linear-gradient(180deg,
    transparent,
    rgba(0,255,163,.1),
    rgba(0,255,163,.2));
  animation:scanTrail 2.8s cubic-bezier(.6,0,.4,1) infinite;
}
@keyframes scanTrail{
  0%{top:-100px}
  100%{top:100%}
}

/* ────────── STATUS CHIP ────────── */
.status-chip{
  position:absolute;
  bottom:32px;left:50%;
  transform:translateX(-50%);
  z-index:5;
  display:flex;align-items:center;gap:14px;
  padding:14px 28px 14px 22px;
  background:rgba(12,17,25,.7);
  border:1px solid rgba(255,255,255,.1);
  border-radius:100px;
  backdrop-filter:blur(24px) saturate(160%);
  -webkit-backdrop-filter:blur(24px) saturate(160%);
  box-shadow:
    0 16px 48px rgba(0,0,0,.5),
    0 0 0 1px rgba(0,255,163,.1),
    inset 0 1px 0 rgba(255,255,255,.08);
  white-space:nowrap;
  max-width:90%;
  transition:all .4s cubic-bezier(.16,1,.3,1);
}
.status-chip.ok{
  border-color:rgba(0,255,163,.35);
  box-shadow:
    0 16px 48px rgba(0,0,0,.5),
    0 0 0 1px rgba(0,255,163,.25),
    0 0 32px rgba(0,255,163,.2),
    inset 0 1px 0 rgba(255,255,255,.08);
}
.status-chip.error{
  border-color:rgba(255,83,112,.35);
  box-shadow:
    0 16px 48px rgba(0,0,0,.5),
    0 0 0 1px rgba(255,83,112,.25),
    0 0 32px rgba(255,83,112,.2),
    inset 0 1px 0 rgba(255,255,255,.08);
}
.status-chip.busy{
  border-color:rgba(255,183,77,.35);
}

/* Waveform */
.s-wave{
  display:flex;align-items:center;gap:2.5px;height:22px;
}
.s-wave span{
  width:2.5px;height:5px;border-radius:2px;
  background:var(--g);
  box-shadow:0 0 6px var(--g-glow);
  animation:wave 1.2s ease-in-out infinite;
}
.s-wave span:nth-child(1){animation-delay:.0s}
.s-wave span:nth-child(2){animation-delay:.1s}
.s-wave span:nth-child(3){animation-delay:.2s}
.s-wave span:nth-child(4){animation-delay:.3s}
.s-wave span:nth-child(5){animation-delay:.4s}
@keyframes wave{
  0%,100%{height:4px;opacity:.4}
  50%{height:20px;opacity:1}
}
.status-chip.busy .s-wave span{background:var(--amber);box-shadow:0 0 6px rgba(255,183,77,.5)}
.status-chip.ok .s-wave span{background:var(--g);box-shadow:0 0 6px var(--g-glow)}
.status-chip.error .s-wave span{
  background:var(--red);box-shadow:0 0 6px rgba(255,83,112,.5);
  animation-play-state:paused;height:16px
}

.s-msg{
  font-size:18px;
  font-weight:600;
  color:#fff;
  letter-spacing:.2px;
  font-family:var(--font);
  text-shadow:0 1px 8px rgba(0,0,0,.6);
}

/* ════════════════════════════════════════
   BOTTOM PANEL
════════════════════════════════════════ */
.bottom-panel{
  position:relative;
  background:
    linear-gradient(180deg, var(--bg2), var(--bg));
  border-top:1px solid var(--b1);
  padding:20px 26px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  flex-shrink:0;
}
.bottom-panel::before{
  content:'';position:absolute;
  top:-1px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,
    transparent,
    var(--g3) 20%,
    var(--cy2) 50%,
    var(--g3) 80%,
    transparent);
  opacity:.7;
  animation:borderGlow 4s ease-in-out infinite;
}
@keyframes borderGlow{
  0%,100%{opacity:.5}
  50%{opacity:.9}
}

.scan-hint{
  display:flex;align-items:center;gap:14px;flex:1;
}
.hint-icon{
  position:relative;
  width:50px;height:50px;flex-shrink:0;
  background:linear-gradient(135deg, var(--s2), var(--s1));
  border:1px solid var(--b2);
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.05),
    0 6px 16px rgba(0,0,0,.35);
}
.hint-icon::before{
  content:'';position:absolute;inset:-1px;
  border-radius:14px;
  background:linear-gradient(135deg, var(--g3), transparent 60%);
  z-index:-1;opacity:.5;
}
.hint-icon svg{width:24px;height:24px;color:var(--g);filter:drop-shadow(0 0 8px var(--g-glow));}

.hint-text{display:flex;flex-direction:column;gap:4px;}
.hint-title{
  font-size:14px;font-weight:700;
  color:var(--t1);
  letter-spacing:-.1px;
  display:flex;align-items:center;gap:8px;
}
.hint-title .ready-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--g);
  box-shadow:0 0 8px var(--g-glow);
  animation:readyPulse 2s infinite;
}
@keyframes readyPulse{
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:.5;transform:scale(.8)}
}
.hint-sub{
  font-size:10px;color:var(--t2);
  font-family:var(--mono);font-weight:500;
  letter-spacing:.8px;text-transform:uppercase;
}

.footer-right{
  display:flex;align-items:center;gap:16px;
  flex-shrink:0;
}

/* Sound toggle */
.sound-btn{
  width:40px;height:40px;
  background:linear-gradient(135deg, var(--s2), var(--s1));
  border:1px solid var(--b2);
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transition:all .2s ease;
  position:relative;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
}
.sound-btn:hover{
  border-color:var(--b3);

}
.sound-btn:active{transform:scale(.95);}
.sound-btn svg{width:18px;height:18px;color:var(--g);}
.sound-btn.off svg{color:var(--t3);}
.sound-btn.off::after{
  content:'';position:absolute;
  top:50%;left:8px;right:8px;height:1.5px;
  background:var(--red);
  transform:translateY(-50%) rotate(-35deg);
  border-radius:1px;
  box-shadow:0 0 4px rgba(255,83,112,.5);

.footer-divider{

}
.footer-info{text-align:right;}
.footer-branch{

}
.footer-date{
  font-size:10px;color:var(--t3);
  font-family:var(--mono);margin-top:3px;
  letter-spacing:1.2px;font-weight:500;
}

/* ════════════════════════════════════════
   RESULT OVERLAY
════════════════════════════════════════ */
.overlay{
  display:none;
  position:fixed;inset:0;z-index:999;
  background:rgba(2,4,8,.8);
  backdrop-filter:blur(32px) saturate(150%);
  -webkit-backdrop-filter:blur(32px) saturate(150%);
  align-items:center;justify-content:center;
  padding:16px;
}
.overlay.show{
  display:flex;
  animation:overlayIn .28s cubic-bezier(.16,1,.3,1);
}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}

.r-card{
  position:relative;
  width:100%;max-width:440px;
  background:linear-gradient(180deg, var(--s2), var(--s1));
  border:1px solid var(--b2);
  border-radius:32px;
  overflow:hidden;
  box-shadow:
    0 40px 100px rgba(0,0,0,.7),
    0 0 0 1px rgba(255,255,255,.04),
    inset 0 1px 0 rgba(255,255,255,.06);
  animation:cardPop .45s cubic-bezier(.16,1,.3,1);
}
@keyframes cardPop{
  from{opacity:0;transform:scale(.88) translateY(30px);}
  to{opacity:1;transform:scale(1) translateY(0);}
}

/* Ambient glow around card */
.r-card::before{
  content:'';position:absolute;inset:-40px;z-index:-1;
  background:radial-gradient(ellipse at center, var(--g-glow), transparent 70%);
  opacity:.2;
  filter:blur(30px);
}
.r-card.out::before{
  background:radial-gradient(ellipse at center, rgba(255,183,77,.4), transparent 70%);
}
.r-card.err::before{
  background:radial-gradient(ellipse at center, rgba(255,83,112,.4), transparent 70%);
}

/* Top accent strip */
.r-accent{
  position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg, var(--g), var(--cy), var(--vi), var(--cy), var(--g));
  background-size:300% 100%;
  animation:accentSlide 4s linear infinite;
  z-index:3;
  box-shadow:0 0 12px var(--g-glow);
}
@keyframes accentSlide{
  0%{background-position:0% 50%}
  100%{background-position:300% 50%}
}
.r-card.err .r-accent{
  background:linear-gradient(90deg, var(--red), #FF8F9B, var(--red));
  background-size:200% 100%;
  box-shadow:0 0 12px rgba(255,83,112,.5);
}
.r-card.out .r-accent{
  background:linear-gradient(90deg, var(--amber), #FFD699, var(--amber));
  background-size:200% 100%;
  box-shadow:0 0 12px rgba(255,183,77,.5);
}

/* Photo */
.r-photo{
  display:none;
  position:relative;
  width:100%;height:180px;
  background:#000;overflow:hidden;
}
.r-photo img{
  width:100%;height:100%;
  object-fit:cover;display:block;
  filter:brightness(.85) saturate(1.15) contrast(1.05);
}
.r-photo::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,
    transparent 0%,
    rgba(19,25,37,.3) 60%,
    var(--s2) 100%);
}
.r-photo-tag{
  position:absolute;top:14px;right:14px;z-index:2;
  display:flex;align-items:center;gap:6px;
  background:rgba(0,0,0,.6);
  border:1px solid rgba(255,255,255,.12);
  border-radius:9px;
  backdrop-filter:blur(10px);

  color:rgba(255,255,255,.75);
  padding:5px 10px;

}
.r-photo-tag::before{
  content:'';width:5px;height:5px;border-radius:50%;
  background:var(--g);box-shadow:0 0 6px var(--g);
}

/* Body */
.r-body{padding:24px 26px 0;position:relative;z-index:2;}

.r-top{
  display:flex;align-items:center;gap:16px;
  margin-bottom:18px;
}
.r-avatar{

  width:60px;height:60px;border-radius:20px;flex-shrink:0;

}
.r-avatar::before{

}
.r-avatar.in {

<script>
/* ── CONFIG ──────────────────────────────────── */
const BRANCH_ID   = '{{ kiosk_branch_id|default:"" }}';
const API_URL     = '{% url "attendance:api_scan" %}';
const CLOSE_MS    = 2400;

/* ══════════════════════════════════════════════
   SOUND SYSTEM — Web Audio API
══════════════════════════════════════════════ */
const SND = (function(){
  let ctx = null;
  let enabled = localStorage.getItem('zenko_sound') !== '0';

  function ensure(){
    if(!ctx){
      try { ctx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(e){ return null; }
    }
    if(ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  // Note generator — oscillator + gain envelope
  function tone({freq=440, type='sine', start=0, dur=.15, gain=.2, freqEnd=null, slide='exponential'}){
    const c = ensure(); if(!c) return;
    const t0 = c.currentTime + start;
    const osc = c.createOscillator();
    const g   = c.createGain();
    osc.type  = type;
    osc.frequency.setValueAtTime(freq, t0);
    if(freqEnd){
      if(slide==='exponential') osc.frequency.exponentialRampToValueAtTime(Math.max(freqEnd,1), t0+dur);
      else osc.frequency.linearRampToValueAtTime(freqEnd, t0+dur);
    }
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(gain, t0+.01);
    g.gain.exponentialRampToValueAtTime(.0001, t0+dur);
    osc.connect(g); g.connect(c.destination);
    osc.start(t0); osc.stop(t0+dur+.02);
  }

  // Noise burst for error
  function noise({start=0, dur=.15, gain=.12}){
    const c = ensure(); if(!c) return;
    const t0 = c.currentTime + start;
    const buf = c.createBuffer(1, c.sampleRate*dur, c.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i] = (Math.random()*2-1) * (1 - i/d.length);
    const src = c.createBufferSource(); src.buffer = buf;
    const g = c.createGain();
    g.gain.setValueAtTime(gain, t0);
    g.gain.exponentialRampToValueAtTime(.0001, t0+dur);
    const f = c.createBiquadFilter();
    f.type = 'bandpass'; f.frequency.value = 800; f.Q.value = .8;
    src.connect(f); f.connect(g); g.connect(c.destination);
    src.start(t0); src.stop(t0+dur);
  }

  return {
    get enabled(){ return enabled; },
    toggle(){
      enabled = !enabled;
      localStorage.setItem('zenko_sound', enabled ? '1':'0');
      if(enabled) this.blip();
      return enabled;
    },
    // Small UI blip
    blip(){
      if(!enabled) return;
      tone({freq:880, type:'sine', dur:.08, gain:.08});
    },
    // Scan beep — busy
    scan(){
      if(!enabled) return;
      tone({freq:1200, type:'sine', dur:.06, gain:.1});
    },
    // ── SUCCESS: CHECK-IN (kirish) — rising major chord
    checkIn(){
      if(!enabled) return;
      tone({freq:523.25, type:'sine', start:0,    dur:.12, gain:.14});       // C5
      tone({freq:659.25, type:'sine', start:.08,  dur:.14, gain:.14});       // E5
      tone({freq:783.99, type:'sine', start:.16,  dur:.20, gain:.16});       // G5
      tone({freq:1046.5, type:'triangle', start:.22, dur:.28, gain:.12});    // C6 shimmer
    },
    // ── SUCCESS: CHECK-OUT (chiqish) — descending warm
    checkOut(){
      if(!enabled) return;
      tone({freq:783.99, type:'sine', start:0,    dur:.14, gain:.14});       // G5
      tone({freq:659.25, type:'sine', start:.10,  dur:.16, gain:.14});       // E5
      tone({freq:523.25, type:'triangle', start:.20, dur:.24, gain:.14});    // C5
    },
    // ── ERROR — low thud + noise + down-slide
    error(){
      if(!enabled) return;
      tone({freq:220, type:'sawtooth', start:0,    dur:.18, gain:.1, freqEnd:110});
      tone({freq:180, type:'square',   start:.14,  dur:.22, gain:.08, freqEnd:90});
      noise({start:.02, dur:.18, gain:.05});
    }
  };
})();

/* ── SOUND BUTTON ────────────────────────────── */
(function(){
  const btn = document.getElementById('soundBtn');
  function apply(){
    btn.classList.toggle('off', !SND.enabled);
  }
  apply();
  btn.addEventListener('click', ()=>{ SND.toggle(); apply(); });
})();

/* ── CLOCK ───────────────────────────────────── */
(function(){
  const te  = document.getElementById('clockTime');
  const de  = document.getElementById('clockDate');
  const ft  = document.getElementById('ftDate');
  const D   = ['Yakshanba','Dushanba','Seshanba','Chorshanba','Payshanba','Juma','Shanba'];
  const M   = ['Yanvar','Fevral','Mart','Aprel','May','Iyun','Iyul','Avgust','Sentabr','Oktabr','Noyabr','Dekabr'];
  const Ms  = ['Yan','Fev','Mar','Apr','May','Iyn','Iyl','Avg','Sen','Okt','Noy','Dek'];
  function tick(){
    const n = new Date();
    const p = v => String(v).padStart(2,'0');
    te.innerHTML = `${p(n.getHours())}<span class="colon">:</span>${p(n.getMinutes())}<span class="sec">${p(n.getSeconds())}</span>`;
    de.textContent = `${D[n.getDay()].slice(0,3)} · ${p(n.getDate())} ${Ms[n.getMonth()]}`;
    if(ft) ft.textContent = `${p(n.getDate())}.${p(n.getMonth()+1)}.${n.getFullYear()}`;
  }
  tick(); setInterval(tick, 1000);
})();

/* ── PARTICLES ──────────────────────────────── */
(function(){
  const wrap = document.getElementById('particles');
  for(let i=0;i<14;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = (Math.random()*100)+'%';
    p.style.animationDelay  = (Math.random()*8)+'s';
    p.style.animationDuration = (6 + Math.random()*6)+'s';
    p.style.opacity = .3 + Math.random()*.4;
    wrap.appendChild(p);
  }
})();

/* ── CAMERA ──────────────────────────────────── */
let camOk = false;

(async function(){
  const vid   = document.getElementById('camVideo');
  const empty = document.getElementById('camEmpty');
  try {
    const s = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:{ exact: 'environment' }, width:{ideal:1280}, height:{ideal:720} },
      audio:false
    });
    vid.srcObject = s;
    await vid.play();
    camOk = true;
    empty.style.display = 'none';
    vid.style.display   = 'block';
    vid.style.transform = 'scaleX(1)';
  } catch(e){
    try {
      const s = await navigator.mediaDevices.getUserMedia({
        video:{ facingMode:'user', width:{ideal:1280}, height:{ideal:720} },
        audio:false
      });
      vid.srcObject = s;
      await vid.play();
      camOk = true;
      empty.style.display = 'none';
      vid.style.display   = 'block';
      vid.style.transform = 'scaleX(-1)';
    } catch(e2){
      console.warn('Camera:', e2.message);
    }
  }
})();

function doSnap(){
  if(!camOk) return null;
  const v = document.getElementById('camVideo');
  const c = document.getElementById('snapCanvas');
  if(!v.videoWidth) return null;
  c.width  = Math.min(v.videoWidth,  960);
  c.height = Math.min(v.videoHeight, 540);
  c.getContext('2d').drawImage(v, 0, 0, c.width, c.height);
  const fl = document.getElementById('camFlash');
  fl.classList.add('on');
  setTimeout(()=> fl.classList.remove('on'), 120);
  return c.toDataURL('image/jpeg', 0.78);
}

function signalFlash(type){
  const el = document.getElementById('camSignal');
  el.classList.remove('ok','err','on');
  void el.offsetWidth;
  el.classList.add(type, 'on');
  setTimeout(()=> el.classList.remove('on'), 800);
}

/* ── STATUS ──────────────────────────────────── */
function setStatus(msg, mode){
  document.getElementById('sMsg').textContent = msg;
  const chip = document.getElementById('statusChip');
  chip.classList.remove('busy','ok','error','idle');
  chip.classList.add(mode || 'idle');
}

/* ── HARDWARE SCANNER ────────────────────────── */
let scanning = true;
let hwTimer  = null;
const hwInput = document.getElementById('hwInput');

function focusHW(){
  if(!document.getElementById('overlay').classList.contains('show'))
    hwInput.focus();
}
focusHW();
setInterval(focusHW, 600);
document.addEventListener('click', ()=> setTimeout(focusHW, 50));

hwInput.addEventListener('keydown', e=>{
  if(e.key === 'Enter'){
    e.preventDefault();
    const val = hwInput.value.trim();
    hwInput.value = '';
    clearTimeout(hwTimer);
    if(!val || !scanning) return;
    scanning = false;
    handleToken(val);
  } else {
    clearTimeout(hwTimer);
    hwTimer = setTimeout(()=>{ hwInput.value=''; }, 800);
  }
});

/* ── TOKEN → API ─────────────────────────────── */
function handleToken(token){
  setStatus('Tekshirilmoqda...', 'busy');
  SND.scan();
  const photo = doSnap();
  const body  = new URLSearchParams();
  body.append('token', token);
  if(BRANCH_ID) body.append('branch_id', BRANCH_ID);
  if(photo)     body.append('photo', photo);

  fetch(API_URL,{
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body: body.toString()
  })
  .then(r=> r.json())
  .then(d=>{ d._photo = photo; showResult(d); })
  .catch(err=>{
    console.error(err);
    showResult({ok:false, msg:"Tarmoq xatosi. Qayta urinib ko'ring.", _photo:photo});
  });
}

/* ── SVG ICONS ───────────────────────────────── */
const IC = {
  check:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>`,
  out:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6A2.25 2.25 0 0 0 5.25 5.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9"/></svg>`,
  x:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 18 18 6M6 6l12 12"/></svg>`
};

/* ── SHOW RESULT ─────────────────────────────── */
let closeTimer = null;

function showResult(data){
  const ov   = document.getElementById('overlay');
  const card = document.getElementById('rCard');
  const av   = document.getElementById('rAvatar');
  const tag  = document.getElementById('rTag');
  const nm   = document.getElementById('rName');
  const sub  = document.getElementById('rSub');
  const am   = document.getElementById('aMain');
  const as_  = document.getElementById('aShift');
  const st   = document.getElementById('rStats');
  const ph   = document.getElementById('rPhoto');
  const pi   = document.getElementById('rPhotoImg');

  am.className  = 'r-alert';
  as_.className = 'r-alert';
  am.textContent = as_.textContent = '';
  st.innerHTML = '';
  ph.style.display = 'none';
  card.className = 'r-card';

  if(data._photo){ pi.src = data._photo; ph.style.display='block'; }

  if(data.ok){
    const isOut   = data.action === 'check_out';
    const isEarly = data.is_early;
    const isLate  = data.is_late;

    if(isOut) card.classList.add('out');

    av.className  = `r-avatar ${isOut?'out':'in'}`;
    av.innerHTML  = isOut ? IC.out : IC.check;
    tag.innerHTML = isOut
      ? '<span class="r-tag out">Chiqish</span>'
      : '<span class="r-tag in">Kirish</span>';
    nm.textContent = data.user_name || '';
    sub.textContent= data.msg       || '';

    if(!isOut && isEarly && data.diff_minutes){
      am.className   = 'r-alert early';
      am.innerHTML   = `<div><strong>Erta kelish</strong> · Smenadan ${Math.abs(data.diff_minutes)} daqiqa oldin · hisob ${data.hisob_time||data.shift_start}dan boshlanadi</div>`;
    } else if(!isOut && isLate && data.diff_minutes){
      am.className   = 'r-alert late';
      am.innerHTML   = `<div><strong>Kechikish</strong> · ${data.diff_minutes} daqiqa kech keldi</div>`;
    }
    if(!isOut && data.shift_name){
      as_.className   = 'r-alert info';
      as_.innerHTML   = `<div><strong>${data.shift_name}</strong> · ${data.shift_start||''}–${data.shift_end||''}</div>`;
    }

    const t  = data.time      || '--:--';
    const ht = data.hisob_time;
    let html = `
      <div class="r-stat">
        <div class="lb">Vaqt</div>
        <div class="vl">${t}</div>
        ${ht && ht!==t ? `<div class="note">hisob: ${ht}</div>` : ''}
      </div>`;

    if(isOut && data.worked){
      html += `
        <div class="r-stat${data.early_leave?' amber':''}">
          <div class="lb">Ishladi</div>
          <div class="vl sm">${data.worked}</div>
          ${data.early_leave?'<div class="note" style="color:var(--amber)">erta chiqdi</div>':''}
        </div>`;
    } else if(data.status){
      const sm = {present:'Vaqtida',late:'Kechikdi',absent:'Kelmadi',early:'Erta keldi'};
      html += `
        <div class="r-stat">
          <div class="lb">Holat</div>
          <div class="vl sm">${sm[data.status]||data.status}</div>
        </div>`;
    }
    st.innerHTML = html;

    setStatus(
      isOut ? `${data.user_name} chiqdi` : `${data.user_name} kirdi`,
      'ok'
    );

    // Sound + signal flash
    signalFlash('ok');
    if(isOut) SND.checkOut(); else SND.checkIn();

  } else {
    card.classList.add('err');
    av.className   = 'r-avatar err';
    av.innerHTML   = IC.x;
    tag.innerHTML  = '<span class="r-tag err">Xatolik</span>';
    nm.textContent = 'Muvaffaqiyatsiz';
    sub.textContent= data.msg || "Noma'lum xato";
    setStatus(data.msg || 'Xatolik', 'error');
    signalFlash('err');
    SND.error();
  }

  const fill = document.getElementById('rFill');
  fill.style.transition = 'none';
  fill.style.width      = '100%';
  requestAnimationFrame(()=> requestAnimationFrame(()=>{
    fill.style.transition = `width ${CLOSE_MS}ms linear`;
    fill.style.width      = '0%';
  }));

  ov.classList.add('show');
  clearTimeout(closeTimer);
  closeTimer = setTimeout(()=>{
    if(ov.classList.contains('show')) closeResult();
  }, CLOSE_MS);
}

/* ── CLOSE ───────────────────────────────────── */
function closeResult(){
  clearTimeout(closeTimer);
  document.getElementById('overlay').classList.remove('show');
  setStatus("QR kodni skanerga tuting", 'idle');
  scanning = true;
  setTimeout(focusHW, 80);
}
</script>
